# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "uv" # See documentation for possible values
    directory: "/" # Location of package manifests
    schedule:
      interval: "daily"
    versioning-strategy: increase

  - package-ecosystem: "github-actions"
    directory: "/" # Workflows under .github/workflows
    schedule:
      interval: "daily"

  - package-ecosystem: "docker"
    directory: "/" # Dockerfile location
    schedule:
      interval: "daily"

  - package-ecosystem: "npm"
    directory: "/scripts/editor" # Vendored Milkdown editor bundle
    schedule:
      interval: "weekly"
    versioning-strategy: increase
    groups:
      # crepe and plugin-slash share Milkdown/ProseMirror internals and must
      # move together (single bundle, single module graph).
      milkdown:
        patterns:
          - "@milkdown/*"
