name: Run Tests

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint (ruff)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      # ruff-action resolves the ruff version from the exact pin in
      # pyproject.toml, so CI and local runs always use the same release.
      - name: Ruff check
        uses: astral-sh/ruff-action@v4.1.0
        with:
          args: check --output-format=github

      - name: Ruff format check
        uses: astral-sh/ruff-action@v4.1.0
        with:
          args: format --check --diff

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Each entry pins a per-module line+branch coverage floor, rounded
        # down to the nearest multiple of 5 and sitting at least 3 points
        # below the current baseline to absorb flakiness.
        # To raise a threshold, update the number here — never lower it.
        include:
          - module: ai
            min_coverage: 55
          - module: calendar
            min_coverage: 75
          - module: chat
            min_coverage: 55
          - module: common
            min_coverage: 75
          - module: core
            min_coverage: 45
          - module: dashboard
            min_coverage: 95
          - module: files
            min_coverage: 65
          - module: mail
            min_coverage: 55
          - module: notes
            min_coverage: 45
          - module: notifications
            min_coverage: 80
          - module: projects
            min_coverage: 85
          - module: users
            min_coverage: 85
    name: Tests (${{ matrix.module }})
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.14'

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Django test suite with coverage
        env:
          PYTHONWARNINGS: default
        run: |
          uv run coverage run manage.py test workspace.${{ matrix.module }} -v 2

      - name: Module coverage report
        if: always()
        run: |
          uv run coverage combine || true
          uv run coverage report \
            --include='workspace/${{ matrix.module }}/*' \
            --fail-under=${{ matrix.min_coverage }}

  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Only modules that actually have tests/e2e/ test cases.
        # workspace.common hosts the shared PlaywrightTestCase base class
        # but no tests of its own, so it is intentionally absent.
        module:
          - calendar
          - chat
          - core
          - dashboard
          - files
          - mail
          - notes
          - users
    name: E2E (${{ matrix.module }})
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.14'

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Install dependencies
        run: uv sync --frozen

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          E2E: '1'
          PYTHONWARNINGS: default
        run: |
          uv run python manage.py test workspace.${{ matrix.module }}.tests.e2e -v 2

  js:
    runs-on: ubuntu-latest
    name: JS unit tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Run JS unit tests
        run: node --test "workspace/*/tests/js/**/*.test.js"

  webdav-mount:
    runs-on: ubuntu-latest
    name: WebDAV (davfs2 mount)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.14'

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Install dependencies
        run: uv sync --frozen

      - name: Install davfs2
        run: |
          sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y davfs2
          # The test runner already wraps mount.davfs in `sudo -n` when
          # the binary is not SUID; the GitHub-hosted runner ships with
          # passwordless sudo so no further config is needed.
          sudo modprobe fuse || true

      - name: Run WebDAV mount tests
        env:
          # Turn missing prerequisites into hard failures: a regression
          # in the CI image (davfs2 missing, sudo broken, …) must be
          # loud, not silently skipped.
          WORKSPACE_DAVFS2_TESTS: '1'
          PYTHONWARNINGS: default
        run: |
          uv run python manage.py test workspace.files.tests.test_webdav_mount -v 2
