services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DEBUG=0
      - SECRET_KEY=${SECRET_KEY:-change-me-to-a-real-secret-key}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-}
      - USE_X_FORWARDED_HOST=${USE_X_FORWARDED_HOST:-}
      - USE_X_FORWARDED_PORT=${USE_X_FORWARDED_PORT:-}
      - DATABASE_URL=sqlite:////app/data/db.sqlite3
      - MEDIA_ROOT=/app/data
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-6}
      - WEBPUSH_VAPID_PRIVATE_KEY=${WEBPUSH_VAPID_PRIVATE_KEY:-}
      - WEBPUSH_VAPID_PUBLIC_KEY=${WEBPUSH_VAPID_PUBLIC_KEY:-}
      - WEBPUSH_VAPID_MAILTO=${WEBPUSH_VAPID_MAILTO:-}
      # OAuth2 Mail Providers (optional)
      - OAUTH_GOOGLE_CLIENT_ID=${OAUTH_GOOGLE_CLIENT_ID:-}
      - OAUTH_GOOGLE_CLIENT_SECRET=${OAUTH_GOOGLE_CLIENT_SECRET:-}
      - OAUTH_MICROSOFT_CLIENT_ID=${OAUTH_MICROSOFT_CLIENT_ID:-}
      - OAUTH_MICROSOFT_CLIENT_SECRET=${OAUTH_MICROSOFT_CLIENT_SECRET:-}
      # Generic OAuth2 provider (optional, for custom providers)
      - OAUTH_GENERIC_CLIENT_ID=${OAUTH_GENERIC_CLIENT_ID:-}
      - OAUTH_GENERIC_CLIENT_SECRET=${OAUTH_GENERIC_CLIENT_SECRET:-}
      - OAUTH_GENERIC_NAME=${OAUTH_GENERIC_NAME:-}
      - OAUTH_GENERIC_AUTH_URL=${OAUTH_GENERIC_AUTH_URL:-}
      - OAUTH_GENERIC_TOKEN_URL=${OAUTH_GENERIC_TOKEN_URL:-}
      - OAUTH_GENERIC_SCOPES=${OAUTH_GENERIC_SCOPES:-}
      - OAUTH_GENERIC_IMAP_HOST=${OAUTH_GENERIC_IMAP_HOST:-}
      - OAUTH_GENERIC_SMTP_HOST=${OAUTH_GENERIC_SMTP_HOST:-}
      # OIDC login / SSO (optional). Run `manage.py oidc_discover <issuer>`
      # to get the four OIDC_OP_* endpoints. Redirect URI: <origin>/oidc/callback/
      - OIDC_RP_CLIENT_ID=${OIDC_RP_CLIENT_ID:-}
      - OIDC_RP_CLIENT_SECRET=${OIDC_RP_CLIENT_SECRET:-}
      - OIDC_OP_AUTHORIZATION_ENDPOINT=${OIDC_OP_AUTHORIZATION_ENDPOINT:-}
      - OIDC_OP_TOKEN_ENDPOINT=${OIDC_OP_TOKEN_ENDPOINT:-}
      - OIDC_OP_USER_ENDPOINT=${OIDC_OP_USER_ENDPOINT:-}
      - OIDC_OP_JWKS_ENDPOINT=${OIDC_OP_JWKS_ENDPOINT:-}
      - OIDC_PROVIDER_NAME=${OIDC_PROVIDER_NAME:-OpenID}
      - OIDC_RP_SIGN_ALGO=${OIDC_RP_SIGN_ALGO:-RS256}
      - OIDC_RP_SCOPES=${OIDC_RP_SCOPES:-openid email profile}
      - OIDC_ALLOWED_DOMAINS=${OIDC_ALLOWED_DOMAINS:-}
      - OIDC_REQUIRE_EMAIL_VERIFIED=${OIDC_REQUIRE_EMAIL_VERIFIED:-}
      - OIDC_USERNAME_CLAIM=${OIDC_USERNAME_CLAIM:-preferred_username}
      # AI (optional)
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_BASE_URL=${AI_BASE_URL:-}
      - AI_MODEL=${AI_MODEL:-gpt-5}
      - AI_MAX_TOKENS=${AI_MAX_TOKENS:-2048}
      - AI_CHAT_CONTEXT_SIZE=${AI_CHAT_CONTEXT_SIZE:-30}
      - AI_IMAGE_MODEL=${AI_IMAGE_MODEL:-dall-e-3}
      - AI_IMAGE_BASE_URL=${AI_IMAGE_BASE_URL:-}
      - SEARXNG_URL=${SEARXNG_URL:-}
    volumes:
      - workspace-data:/app/data
    restart: unless-stopped

  celery-worker:
    build: .
    command: celery -A workspace worker -l info
    environment:
      - DEBUG=0
      - SECRET_KEY=${SECRET_KEY:-change-me-to-a-real-secret-key}
      - DATABASE_URL=sqlite:////app/data/db.sqlite3
      - MEDIA_ROOT=/app/data
      - WEBPUSH_VAPID_PRIVATE_KEY=${WEBPUSH_VAPID_PRIVATE_KEY:-}
      - WEBPUSH_VAPID_PUBLIC_KEY=${WEBPUSH_VAPID_PUBLIC_KEY:-}
      - WEBPUSH_VAPID_MAILTO=${WEBPUSH_VAPID_MAILTO:-}
      # OAuth2 Mail Providers (optional)
      - OAUTH_GOOGLE_CLIENT_ID=${OAUTH_GOOGLE_CLIENT_ID:-}
      - OAUTH_GOOGLE_CLIENT_SECRET=${OAUTH_GOOGLE_CLIENT_SECRET:-}
      - OAUTH_MICROSOFT_CLIENT_ID=${OAUTH_MICROSOFT_CLIENT_ID:-}
      - OAUTH_MICROSOFT_CLIENT_SECRET=${OAUTH_MICROSOFT_CLIENT_SECRET:-}
      # Generic OAuth2 provider (optional, for custom providers)
      - OAUTH_GENERIC_CLIENT_ID=${OAUTH_GENERIC_CLIENT_ID:-}
      - OAUTH_GENERIC_CLIENT_SECRET=${OAUTH_GENERIC_CLIENT_SECRET:-}
      - OAUTH_GENERIC_NAME=${OAUTH_GENERIC_NAME:-}
      - OAUTH_GENERIC_AUTH_URL=${OAUTH_GENERIC_AUTH_URL:-}
      - OAUTH_GENERIC_TOKEN_URL=${OAUTH_GENERIC_TOKEN_URL:-}
      - OAUTH_GENERIC_SCOPES=${OAUTH_GENERIC_SCOPES:-}
      - OAUTH_GENERIC_IMAP_HOST=${OAUTH_GENERIC_IMAP_HOST:-}
      - OAUTH_GENERIC_SMTP_HOST=${OAUTH_GENERIC_SMTP_HOST:-}
      # OIDC login / SSO (optional). Run `manage.py oidc_discover <issuer>`
      # to get the four OIDC_OP_* endpoints. Redirect URI: <origin>/oidc/callback/
      - OIDC_RP_CLIENT_ID=${OIDC_RP_CLIENT_ID:-}
      - OIDC_RP_CLIENT_SECRET=${OIDC_RP_CLIENT_SECRET:-}
      - OIDC_OP_AUTHORIZATION_ENDPOINT=${OIDC_OP_AUTHORIZATION_ENDPOINT:-}
      - OIDC_OP_TOKEN_ENDPOINT=${OIDC_OP_TOKEN_ENDPOINT:-}
      - OIDC_OP_USER_ENDPOINT=${OIDC_OP_USER_ENDPOINT:-}
      - OIDC_OP_JWKS_ENDPOINT=${OIDC_OP_JWKS_ENDPOINT:-}
      - OIDC_PROVIDER_NAME=${OIDC_PROVIDER_NAME:-OpenID}
      - OIDC_RP_SIGN_ALGO=${OIDC_RP_SIGN_ALGO:-RS256}
      - OIDC_RP_SCOPES=${OIDC_RP_SCOPES:-openid email profile}
      - OIDC_ALLOWED_DOMAINS=${OIDC_ALLOWED_DOMAINS:-}
      - OIDC_REQUIRE_EMAIL_VERIFIED=${OIDC_REQUIRE_EMAIL_VERIFIED:-}
      - OIDC_USERNAME_CLAIM=${OIDC_USERNAME_CLAIM:-preferred_username}
      # AI (optional)
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_BASE_URL=${AI_BASE_URL:-}
      - AI_MODEL=${AI_MODEL:-gpt-5}
      - AI_MAX_TOKENS=${AI_MAX_TOKENS:-2048}
      - AI_CHAT_CONTEXT_SIZE=${AI_CHAT_CONTEXT_SIZE:-30}
      - AI_IMAGE_MODEL=${AI_IMAGE_MODEL:-dall-e-3}
      - AI_IMAGE_BASE_URL=${AI_IMAGE_BASE_URL:-}
      - SEARXNG_URL=${SEARXNG_URL:-}
    volumes:
      - workspace-data:/app/data
    restart: unless-stopped
    depends_on:
      - web

  celery-beat:
    build: .
    command: celery -A workspace beat -l info --schedule=/app/data/celerybeat-schedule
    environment:
      - DEBUG=0
      - SECRET_KEY=${SECRET_KEY:-change-me-to-a-real-secret-key}
      - DATABASE_URL=sqlite:////app/data/db.sqlite3
      - MEDIA_ROOT=/app/data
    volumes:
      - workspace-data:/app/data
    restart: unless-stopped
    depends_on:
      - web

  # Web search (optional) â€” set SEARXNG_URL=http://searxng:8080 to enable
  # All SearXNG config lives in ./searxng/settings.yml
  # searxng:
  #   image: searxng/searxng:latest
  #   volumes:
  #     - ./searxng:/etc/searxng
  #   restart: unless-stopped

volumes:
  workspace-data:
