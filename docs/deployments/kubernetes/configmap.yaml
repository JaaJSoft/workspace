apiVersion: v1
kind: ConfigMap
metadata:
  name: workspace-config
  namespace: workspace
data:
  DEBUG: "0"
  ALLOWED_HOSTS: "workspace.example.com,localhost"
  CSRF_TRUSTED_ORIGINS: "https://workspace.example.com"
  GUNICORN_WORKERS: "3"
  GUNICORN_LOG_LEVEL: "info"
  DJANGO_LOG_LEVEL: "INFO"
  TRASH_RETENTION_DAYS: "30"
  MEDIA_ROOT: "/app/data"
  WEBPUSH_VAPID_PUBLIC_KEY: ""
  WEBPUSH_VAPID_MAILTO: ""
  AI_MODEL: "gpt-5"
  AI_MAX_TOKENS: "2048"
  AI_CHAT_CONTEXT_SIZE: "30"
  AI_IMAGE_MODEL: "dall-e-3"
  SEARXNG_URL: ""  # e.g. http://searxng.workspace.svc:8080
  SEARXNG_BLOCKED_DOMAINS: ""  # e.g. evil.com,spam.org
