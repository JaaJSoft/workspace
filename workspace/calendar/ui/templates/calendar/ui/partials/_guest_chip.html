{% comment %}
Removable guest / invitee chip
==============================
Shared between the event modal and the poll modal. Rendered inside an
Alpine `<template x-for>`, so the parameters below are Alpine expression
fragments evaluated in the caller's loop scope (not Django values).

Params:
  - user_id_expr:  expression for the user id   (e.g. "member.id")
  - username_expr: expression for the username  (e.g. "member.username")
  - remove_expr:   expression run on remove     (e.g. "removeMember(member.id)")
{% endcomment %}
<span class="inline-flex items-center gap-1.5 rounded-full border border-base-300 bg-base-100 py-0.5 pl-1 pr-1">
  <div class="flex items-center justify-center w-6 h-6 flex-shrink-0" x-html="userAvatarHtml({{ user_id_expr }}, {{ username_expr }}, 'w-6 h-6 text-[0.6rem]', {presence: false})"></div>
  <span class="text-xs" x-text="{{ username_expr }}"></span>
  <button type="button" class="btn btn-ghost btn-circle btn-xs min-h-0 h-5 w-5 p-0" @click="{{ remove_expr }}" :aria-label="'Remove ' + {{ username_expr }}">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
</span>
