{# Poll modals: list, create, edit, detail. #}
{# Included from index.html inside the main content block. #}
<!-- Poll List Modal -->
<dialog class="modal" :class="showPollListModal && 'modal-open'" @click.self="showPollListModal = false" @keydown.escape.window="showPollListModal && (showPollListModal = false)">
  <div class="modal-box w-11/12 max-w-2xl h-[75vh] flex flex-col p-0">
    <!-- Header -->
    <div class="flex items-center justify-between px-5 pt-5 pb-3 flex-shrink-0">
      <h3 class="font-bold text-lg">Polls</h3>
      <div class="flex items-center gap-1">
        <button type="button" class="btn btn-sm btn-primary gap-1.5" @click="openPollCreate()">
          <i data-lucide="plus" class="w-3.5 h-3.5"></i> New
        </button>
        <button type="button" class="btn btn-sm btn-square btn-ghost" @click="showPollListModal = false">
          <i data-lucide="x" class="w-4 h-4"></i>
        </button>
      </div>
    </div>

    <!-- Toolbar: filters + search -->
    <div class="px-5 pb-3 flex flex-col gap-2 flex-shrink-0">
      <div class="flex items-center justify-between gap-3">
        <div class="join">
          <button type="button" class="join-item btn btn-sm"
                  :class="pollFilter === 'mine' ? 'btn-active' : ''"
                  @click="setPollFilter('mine')">My polls</button>
          <button type="button" class="join-item btn btn-sm"
                  :class="pollFilter === 'shared' ? 'btn-active' : ''"
                  @click="setPollFilter('shared')">Shared with me</button>
        </div>
        <label class="flex items-center gap-1.5 cursor-pointer select-none">
          <input type="checkbox" class="toggle toggle-xs" :checked="pollShowClosed" @change="togglePollShowClosed()">
          <span class="text-xs text-base-content/60">Show closed</span>
        </label>
      </div>
      <label class="input input-sm input-bordered flex items-center gap-2 w-full">
        <i data-lucide="search" class="w-3.5 h-3.5 opacity-40"></i>
        <input type="text" class="grow" placeholder="Search polls..." x-model="pollSearch">
        <kbd x-show="pollSearch" @click="pollSearch = ''" class="kbd kbd-xs cursor-pointer hover:bg-base-300">esc</kbd>
      </label>
    </div>

    <div class="divider my-0"></div>

    <!-- Content -->
    <div class="flex-1 overflow-y-auto px-5 py-3">
      <!-- Loading -->
      <div x-show="pollsLoading" class="flex justify-center py-12">
        <span class="loading loading-spinner loading-md"></span>
      </div>

      <!-- Empty state: no polls at all -->
      <div x-show="!pollsLoading && polls.length === 0" class="text-center py-12">
        <div class="w-12 h-12 rounded-full bg-base-200 flex items-center justify-center mx-auto mb-3">
          <i data-lucide="bar-chart-3" class="w-5 h-5 opacity-40"></i>
        </div>
        <template x-if="pollFilter === 'mine'">
          <div>
            <p class="font-medium text-base-content/70">No polls yet</p>
            <p class="text-sm text-base-content/40 mt-1">Create a poll to find the best time for your event</p>
          </div>
        </template>
        <template x-if="pollFilter === 'shared'">
          <div>
            <p class="font-medium text-base-content/70">No shared polls</p>
            <p class="text-sm text-base-content/40 mt-1">Polls you're invited to will appear here</p>
          </div>
        </template>
      </div>

      <!-- Empty state: search no results -->
      <div x-show="!pollsLoading && polls.length > 0 && filteredPolls().length === 0" class="text-center py-12">
        <div class="w-12 h-12 rounded-full bg-base-200 flex items-center justify-center mx-auto mb-3">
          <i data-lucide="search-x" class="w-5 h-5 opacity-40"></i>
        </div>
        <p class="font-medium text-base-content/70">No match</p>
        <p class="text-sm text-base-content/40 mt-1">Try a different search term</p>
      </div>

      <!-- Poll list -->
      <div x-show="!pollsLoading && filteredPolls().length > 0" class="space-y-1.5">
        <template x-for="poll in filteredPolls()" :key="poll.uuid">
          <div class="group flex items-center gap-3 rounded-lg px-3 py-2.5 cursor-pointer transition-colors
                      hover:bg-base-200/60 active:bg-base-200"
               @click="openPollDetail(poll.uuid)">
            <!-- Status indicator -->
            <div class="flex-shrink-0">
              <div class="w-2.5 h-2.5 rounded-full" :class="poll.status === 'open' ? 'bg-success' : 'bg-base-content/20'"></div>
            </div>
            <!-- Info -->
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2">
                <span class="font-medium text-sm truncate" x-text="poll.title"></span>
                <span x-show="poll.status === 'closed'" class="badge badge-xs badge-ghost">closed</span>
              </div>
              <div class="flex items-center gap-3 mt-0.5 text-xs text-base-content/50">
                <span x-show="pollFilter === 'shared'" class="flex items-center gap-1">
                  <i data-lucide="user" class="w-3 h-3"></i>
                  <span x-text="poll.created_by?.username"></span>
                </span>
                <span class="flex items-center gap-1">
                  <i data-lucide="users" class="w-3 h-3"></i>
                  <span x-text="poll.participant_count + ' participant' + (poll.participant_count !== 1 ? 's' : '')"></span>
                </span>
                <span x-text="new Date(poll.created_at).toLocaleDateString()"></span>
              </div>
            </div>
            <!-- Actions -->
            <div class="flex-shrink-0 flex items-center gap-1">
              <template x-if="pollFilter === 'mine'">
                <button type="button" class="btn btn-ghost btn-xs btn-square opacity-0 group-hover:opacity-100 transition-opacity"
                        @click.stop="deletePoll(poll.uuid)" title="Delete">
                  <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                </button>
              </template>
              <i data-lucide="chevron-right" class="w-4 h-4 opacity-0 group-hover:opacity-40 transition-opacity"></i>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>
</dialog>

<!-- Poll Create Modal -->
<dialog class="modal" :class="showPollCreateModal && 'modal-open'" @click.self="showPollCreateModal = false" @keydown.escape.window="showPollCreateModal && (showPollCreateModal = false)">
  <div class="modal-box w-11/12 max-w-3xl h-[70vh] flex flex-col">
    <div class="flex items-center justify-between mb-4 flex-shrink-0">
      <h3 class="font-bold text-lg flex items-center gap-2">
        <span class="w-8 h-8 rounded-full flex items-center justify-center bg-accent/10 text-accent">
          <i data-lucide="plus" class="w-4 h-4"></i>
        </span>
        New Poll
      </h3>
      <button type="button" class="btn btn-sm btn-square btn-ghost" @click="showPollCreateModal = false">
        <i data-lucide="x" class="w-4 h-4"></i>
      </button>
    </div>

    <form @submit.prevent="submitPoll()" class="flex-1 flex flex-col min-h-0">
      <!-- Scrollable content -->
      <div class="flex-1 overflow-y-auto space-y-4 pr-1">
        <!-- Error -->
        <template x-if="pollFormError">
          <div class="alert alert-error alert-sm">
            <i data-lucide="alert-circle" class="w-4 h-4"></i>
            <span x-text="pollFormError"></span>
          </div>
        </template>

        <label class="form-control w-full">
          <div class="label"><span class="label-text">Title</span></div>
          <input type="text" class="input input-bordered input-sm w-full"
                 x-model="pollForm.title" placeholder="e.g. Team meeting next week" required />
        </label>

        <label class="form-control w-full">
          <div class="label"><span class="label-text">Description</span></div>
          <textarea class="textarea textarea-bordered textarea-sm w-full" rows="2"
                    x-model="pollForm.description" placeholder="Optional description"></textarea>
        </label>

        <div>
          <div class="flex items-center justify-between mb-2">
            <span class="label-text font-medium">Time slots</span>
            <button type="button" class="btn btn-ghost btn-xs" @click="addPollSlot()">
              <i data-lucide="plus" class="w-3 h-3"></i> Add slot
            </button>
          </div>
          <div class="space-y-2">
            <template x-for="(slot, i) in pollForm.slots" :key="i">
              <div class="flex items-center gap-2">
                <label class="form-control flex-1">
                  <input type="datetime-local" class="input input-bordered input-sm w-full"
                         x-model="pollForm.slots[i].start" required />
                </label>
                <template x-if="pollForm.slots[i].showEnd">
                  <div class="flex items-center gap-2 flex-1">
                    <span class="text-base-content/40 text-sm">to</span>
                    <label class="form-control flex-1">
                      <input type="datetime-local" class="input input-bordered input-sm w-full"
                             x-model="pollForm.slots[i].end" />
                    </label>
                    <button type="button" class="btn btn-ghost btn-xs btn-square" @click="pollForm.slots[i].showEnd = false; pollForm.slots[i].end = ''" title="Remove end time">
                      <i data-lucide="clock" class="w-3 h-3 opacity-50"></i>
                    </button>
                  </div>
                </template>
                <template x-if="!pollForm.slots[i].showEnd">
                  <button type="button" class="btn btn-ghost btn-xs" @click="pollForm.slots[i].showEnd = true" title="Add end time">
                    <i data-lucide="plus" class="w-3 h-3"></i> End
                  </button>
                </template>
                <button type="button" class="btn btn-ghost btn-xs btn-square"
                        :class="pollForm.slots.length <= 2 ? 'opacity-30 cursor-not-allowed' : ''"
                        @click="removePollSlot(i)" :disabled="pollForm.slots.length <= 2" title="Remove slot">
                  <i data-lucide="x" class="w-3 h-3"></i>
                </button>
              </div>
            </template>
          </div>
        </div>
      </div>

      <!-- Fixed bottom buttons -->
      <div class="modal-action flex-shrink-0">
        <button type="button" class="btn btn-sm btn-ghost" @click="showPollCreateModal = false">Cancel</button>
        <button type="submit" class="btn btn-sm btn-primary" :disabled="pollFormSubmitting || !pollForm.title.trim()">
          <span x-show="pollFormSubmitting" class="loading loading-spinner loading-xs"></span>
          Create poll
        </button>
      </div>
    </form>
  </div>
</dialog>

<!-- Poll Edit Modal -->

</dialog>

<!-- Poll Detail Modal -->
<dialog class="modal" :class="showPollDetailModal && 'modal-open'" @click.self="closePollDetail()" @keydown.escape.window="showPollDetailModal && closePollDetail()">
  <div class="modal-box w-11/12 max-w-3xl h-[70vh] flex flex-col !p-0">
    <!-- Header -->
    <div class="flex items-start justify-between px-4 pt-4 pb-3 flex-shrink-0">
      <div class="flex items-start gap-3 min-w-0">
        <button type="button" class="btn btn-sm btn-ghost btn-square flex-shrink-0 mt-0.5" @click="closePollDetail(); openPollList()">
          <i data-lucide="arrow-left" class="w-4 h-4"></i>
        </button>
        <div class="min-w-0" x-show="currentPoll">
          <h3 class="font-bold text-lg truncate" x-text="currentPoll?.title"></h3>
          <div class="flex items-center gap-2 mt-0.5">
            <span class="badge badge-sm"
                  :class="currentPoll?.status === 'open' ? 'badge-success' : 'badge-ghost'"
                  x-text="currentPoll?.status"></span>
            <span class="text-xs text-base-content/50" x-text="'by ' + (currentPoll?.created_by?.username || '')"></span>
          </div>
        </div>
      </div>
      <div class="flex items-center gap-1 flex-shrink-0">
        <button type="button" class="btn btn-sm btn-ghost" @click="copyPollShareLink()" title="Copy share link" x-show="currentPoll">
          <i data-lucide="share-2" class="w-4 h-4"></i>
          <span class="hidden sm:inline">Share</span>
        </button>
        <template x-if="isPollCreator() && currentPoll?.status === 'open'">
          <button type="button" class="btn btn-sm btn-ghost" @click="openPollEdit()" title="Edit poll">
            <i data-lucide="pencil" class="w-4 h-4"></i>
          </button>
        </template>
        <template x-if="isPollCreator()">
          <button type="button" class="btn btn-sm btn-ghost text-error" @click="deletePoll(currentPoll.uuid)" title="Delete poll">
            <i data-lucide="trash-2" class="w-4 h-4"></i>
          </button>
        </template>
        <button type="button" class="btn btn-sm btn-square btn-ghost" @click="closePollDetail()">
          <i data-lucide="x" class="w-4 h-4"></i>
        </button>
      </div>
    </div>

    <!-- Loading -->
    <div x-show="currentPollLoading" class="flex justify-center py-12 px-4">
      <span class="loading loading-spinner loading-lg"></span>
    </div>

    <!-- Content -->
    <div :style="(!currentPollLoading && currentPoll) ? 'display:flex' : 'display:none'" class="flex-1 flex-col overflow-y-auto px-4">
      <!-- Description -->
      <template x-if="currentPoll?.description">
        <p class="text-sm text-base-content/70 mb-4" x-text="currentPoll.description"></p>
      </template>

      <!-- Invite section (creator only, open poll) -->
      <template x-if="isPollCreator() && currentPoll?.status === 'open'">
        <div class="mb-4">
          <div class="text-xs font-medium text-base-content/40 uppercase tracking-wider mb-2 flex items-center gap-1.5">
            <i data-lucide="user-plus" class="w-3 h-3"></i>
            Invite members
          </div>
          {% include "ui/partials/user_selector.html" with on_select_event="poll-invitee-selected" placeholder="Search users to invite..." %}
          <div class="flex flex-wrap gap-1 mt-2" x-show="(currentPoll?.invitees || []).length > 0">
            <template x-for="invitee in (currentPoll?.invitees || [])" :key="invitee.uuid">
              {% include "calendar/ui/partials/_guest_chip.html" with user_id_expr="invitee.user.id" username_expr="invitee.user.username" remove_expr="removePollInvitee(invitee.user.id)" %}
            </template>
          </div>
        </div>
      </template>

      <!-- Invitees display (non-creator or closed poll) -->
      <template x-if="(!isPollCreator() || currentPoll?.status === 'closed') && (currentPoll?.invitees || []).length > 0">
        <div class="mb-4">
          <div class="text-xs font-medium text-base-content/40 uppercase tracking-wider mb-2 flex items-center gap-1.5">
            <i data-lucide="users" class="w-3 h-3"></i>
            Invited
            <span class="badge badge-xs badge-ghost" x-text="currentPoll.invitees.length"></span>
          </div>
          <div class="flex flex-wrap gap-1">
            <template x-for="invitee in (currentPoll?.invitees || [])" :key="invitee.uuid">
              <span class="badge badge-outline gap-1">
                <div class="w-4 h-4 flex-shrink-0" x-html="userAvatarHtml(invitee.user.id, invitee.user.username, 'w-4 h-4 text-[0.5rem]', {presence: false})"></div>
                <span x-text="invitee.user.username"></span>
              </span>
            </template>
          </div>
        </div>
      </template>

      <!-- Closed banner -->
      <template x-if="currentPoll?.status === 'closed'">
        <div class="alert mb-4 bg-base-200 border-base-300">
          <i data-lucide="trophy" class="w-5 h-5 text-success flex-shrink-0"></i>
          <div class="flex-1">
            <span class="font-medium">This poll has been finalized.</span>
            <template x-if="currentPoll?.event_id">
              <span class="ml-1">An event has been created.</span>
            </template>
            <template x-if="pollChosenSlot()">
              <p class="text-sm opacity-60 mt-0.5">
                Chosen date: <span class="font-medium text-base-content" x-text="formatPollSlotDate(pollChosenSlot()) + ' ' + formatPollSlotTime(pollChosenSlot())"></span>
              </p>
            </template>
          </div>
          <template x-if="currentPoll?.event_id">
            <button type="button" class="btn btn-sm btn-primary gap-1.5 flex-shrink-0" @click="closePollDetail(); openEventById(currentPoll.event_id)">
              <i data-lucide="calendar" class="w-3.5 h-3.5"></i>
              View event
            </button>
          </template>
        </div>
      </template>

      <!-- Finalize toolbar (creator only, open poll) — above grid -->
      <template x-if="isPollCreator() && currentPoll?.status === 'open'">
        <div class="flex items-center gap-2 mb-4 p-3 bg-base-200/50 rounded-lg">
          <i data-lucide="trophy" class="w-4 h-4 text-success flex-shrink-0"></i>
          <span class="text-sm font-medium flex-shrink-0">Finalize:</span>
          <select class="select select-bordered select-sm flex-1" x-model="pollFinalizeSlotId">
            <option value="">Choose winning slot...</option>
            <template x-for="slot in (currentPoll?.slots || [])" :key="slot.uuid">
              <option :value="slot.uuid" x-text="formatPollSlotDate(slot) + ' ' + formatPollSlotTime(slot)"></option>
            </template>
          </select>
          <button type="button" class="btn btn-sm btn-success" @click="finalizePoll()" :disabled="!pollFinalizeSlotId || pollSubmitting">
            <span x-show="pollSubmitting" class="loading loading-spinner loading-xs"></span>
            <i data-lucide="check" class="w-4 h-4" x-show="!pollSubmitting"></i> Finalize
          </button>
        </div>
      </template>

      <!-- Doodle voting grid -->
      <div class="overflow-x-auto">
        <table class="table poll-grid text-sm">
          <thead>
            <tr>
              <th class="min-w-[120px]">
                <div class="flex items-center gap-1.5 text-base-content/60">
                  <i data-lucide="user" class="w-3.5 h-3.5"></i>
                  Participant
                </div>
              </th>
              <template x-for="slot in (currentPoll?.slots || [])" :key="slot.uuid">
                <th class="text-center min-w-[100px]"
                    :class="isPollChosenSlot(slot.uuid) ? 'bg-success/10 slot-chosen' : ''">
                  <div class="flex flex-col items-center gap-0.5">
                    <div class="text-xs font-semibold"
                         :class="isPollChosenSlot(slot.uuid) ? 'text-success' : 'text-primary'"
                         x-text="formatPollSlotDate(slot)"></div>
                    <div class="text-xs opacity-50 flex items-center gap-1">
                      <i data-lucide="clock" class="w-3 h-3"></i>
                      <span x-text="formatPollSlotTime(slot)"></span>
                    </div>
                    <template x-if="isPollChosenSlot(slot.uuid)">
                      <div class="badge badge-success badge-xs gap-0.5 mt-0.5">
                        <i data-lucide="trophy" class="w-2.5 h-2.5"></i>
                        chosen
                      </div>
                    </template>
                  </div>
                </th>
              </template>
            </tr>
          </thead>
          <tbody>
            <!-- Existing participants -->
            <template x-for="p in pollParticipants()" :key="p.key">
              <tr class="hover">
                <td class="font-medium text-sm">
                  <div class="flex items-center gap-2">
                    <template x-if="p.isUser">
                      <div class="w-6 h-6 flex-shrink-0" x-html="userAvatarWithCardHtml(p.userId, p.name, 'w-6 h-6 text-[0.5rem]', {presence: false})"></div>
                    </template>
                    <template x-if="!p.isUser">
                      <div class="w-6 h-6 rounded-full bg-base-300 flex items-center justify-center text-xs font-bold uppercase flex-shrink-0"
                           x-text="p.name.charAt(0)"></div>
                    </template>
                    <span x-text="p.name"></span>
                    <span x-show="!p.isUser" class="badge badge-xs badge-ghost">guest</span>
                  </div>
                </td>
                <template x-for="slot in (currentPoll?.slots || [])" :key="slot.uuid">
                  <td class="text-center"
                      :class="isPollChosenSlot(slot.uuid) ? 'bg-success/10 slot-chosen' : ''">
                    <div class="w-8 h-8 rounded-lg flex items-center justify-center mx-auto transition-colors"
                         :class="pollVoteClass(p.votes[slot.uuid])">
                      <i :data-lucide="pollVoteIcon(p.votes[slot.uuid])" class="w-4 h-4"></i>
                    </div>
                  </td>
                </template>
              </tr>
            </template>

            <!-- My vote row (editable) — only when poll is open -->
            <template x-if="currentPoll?.status === 'open'">
              <tr class="bg-primary/5 border-t-2 border-primary/20">
                <td class="font-medium text-sm">
                  <div class="flex items-center gap-2 text-primary">
                    <div class="w-6 h-6 rounded-full bg-primary/20 flex items-center justify-center">
                      <i data-lucide="pencil" class="w-3 h-3"></i>
                    </div>
                    Your vote
                  </div>
                </td>
                <template x-for="slot in (currentPoll?.slots || [])" :key="slot.uuid">
                  <td class="text-center">
                    <button type="button"
                            class="w-8 h-8 rounded-lg flex items-center justify-center mx-auto cursor-pointer transition-all hover:scale-110 active:scale-95"
                            :class="pollVoteClass(pollMyVotes[slot.uuid])"
                            @click="pollCycleVote(slot.uuid)"
                            title="Click to cycle: yes / maybe / no">
                      <i :data-lucide="pollVoteIcon(pollMyVotes[slot.uuid])" class="w-4 h-4"></i>
                    </button>
                  </td>
                </template>
              </tr>
            </template>
          </tbody>
          <tfoot>
            <tr>
              <td class="text-sm font-medium opacity-70">
                <div class="flex items-center gap-1.5">
                  <i data-lucide="thumbs-up" class="w-3.5 h-3.5 text-success"></i>
                  Yes votes
                </div>
              </td>
              <template x-for="slot in (currentPoll?.slots || [])" :key="slot.uuid">
                <td class="text-center"
                    :class="isPollChosenSlot(slot.uuid) ? 'bg-success/10 slot-chosen' : ''">
                  <span class="text-sm font-semibold text-success" x-text="slot.yes_count"></span>
                </td>
              </template>
            </tr>
          </tfoot>
        </table>
      </div>

      <!-- Legend -->
      <div class="flex flex-wrap gap-4 mt-3 text-xs text-base-content/50">
        <div class="flex items-center gap-1.5">
          <div class="w-5 h-5 rounded bg-success/20 flex items-center justify-center"><i data-lucide="check" class="w-3 h-3 text-success"></i></div>
          Yes
        </div>
        <div class="flex items-center gap-1.5">
          <div class="w-5 h-5 rounded bg-warning/20 flex items-center justify-center"><i data-lucide="help-circle" class="w-3 h-3 text-warning"></i></div>
          Maybe
        </div>
        <div class="flex items-center gap-1.5">
          <div class="w-5 h-5 rounded bg-error/20 flex items-center justify-center"><i data-lucide="x" class="w-3 h-3 text-error"></i></div>
          No
        </div>
      </div>

    </div>

    <!-- Fixed bottom actions -->
    <div class="modal-action flex-shrink-0 px-4 pb-4">
      <button type="button" class="btn btn-sm btn-ghost" @click="closePollDetail()">Close</button>
      <template x-if="currentPoll?.status === 'open'">
        <button type="button" class="btn btn-sm btn-primary" @click="submitPollVotes()" :disabled="pollSubmitting">
          <span x-show="pollSubmitting" class="loading loading-spinner loading-xs"></span>
          <i data-lucide="save" class="w-4 h-4" x-show="!pollSubmitting"></i>
          Save my votes
        </button>
      </template>
    </div>
  </div>
</dialog>
