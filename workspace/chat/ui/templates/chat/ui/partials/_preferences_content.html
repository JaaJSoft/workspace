<div class="space-y-3">
  <label class="flex items-center justify-between gap-2 cursor-pointer">
    <span class="text-sm">Compact conversation list</span>
    <input type="checkbox" class="toggle toggle-sm toggle-info"
      :checked="prefs.compactConversationList"
      @change="update('compactConversationList', $event.target.checked)">
  </label>
  <label class="flex items-center justify-between gap-2 cursor-pointer">
    <span class="text-sm">Compact message view</span>
    <input type="checkbox" class="toggle toggle-sm toggle-info"
      :checked="prefs.compactMessageView"
      @change="update('compactMessageView', $event.target.checked)">
  </label>
</div>
