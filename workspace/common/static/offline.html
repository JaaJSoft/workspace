<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Workspace — Offline</title>
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');</script>
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css"/>
  <script src="https://unpkg.com/lucide@1.11.0/dist/umd/lucide.min.js" integrity="sha384-7PArHXNzg1s/WgbAH9xkBpx4T6MJ0jPAxaEM9yld+zvdFEjSf+wzzv0hDnem/6rw" crossorigin="anonymous"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-base-200">
  <div class="text-center p-8">
    <div class="flex items-center justify-center gap-4 mb-6">
      <div class="w-16 h-16 rounded-xl bg-gradient-to-br from-primary to-secondary flex items-center justify-center shadow-xl">
        <i data-lucide="users" class="w-8 h-8 text-base-100"></i>
      </div>
      <span class="text-5xl font-bold bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">Workspace</span>
    </div>
    <h1 class="text-xl font-semibold mb-2">You're offline</h1>
    <p class="text-base-content/60 mb-6">Check your internet connection and try again.</p>
    <button class="btn btn-primary" onclick="location.reload()">Retry</button>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
