<div class="tabs tabs-boxed overflow-x-auto flex-nowrap">
  <a
    :href="feedUrl.replace(/source=[^&]*/g, '').replace(/[?&]$/, '')"
    class="tab gap-1.5 sm:!px-3 !px-2.5"
    :class="activityTab === 'all' ? 'tab-active' : ''"
    @click="activityTab = 'all'"
    x-target="{{ activity_prefix }}"
  >
    <i data-lucide="layers" class="w-3.5 h-3.5 shrink-0"></i>
    <span class="hidden sm:inline">All</span>
  </a>
  {% for src in activity_sources %}
  <a
    :href="feedUrl.includes('source=') ? feedUrl.replace(/source=[^&]*/, 'source={{ src.slug }}') : feedUrl + (feedUrl.includes('?') ? '&' : '?') + 'source={{ src.slug }}'"
    class="tab gap-1.5 sm:!px-3 !px-2.5"
    :class="activityTab === '{{ src.slug }}' ? 'tab-active' : ''"
    @click="activityTab = '{{ src.slug }}'"
    x-target="{{ activity_prefix }}"
  >
    <i data-lucide="{{ src.icon }}" class="w-3.5 h-3.5 shrink-0"></i>
    <span class="hidden sm:inline">{{ src.label }}</span>
  </a>
  {% endfor %}
</div>
