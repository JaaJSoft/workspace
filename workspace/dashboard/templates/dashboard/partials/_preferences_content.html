<div class="space-y-3">
  <label class="flex items-center justify-between gap-4">
    <div>
      <div class="font-medium text-sm">Show upcoming events</div>
      <div class="text-xs text-base-content/60">Display today's calendar events on the dashboard.</div>
    </div>
    <input
      type="checkbox"
      class="toggle toggle-sm toggle-primary"
      x-model="showUpcoming"
      @change="save('show_upcoming_events', showUpcoming)"
    >
  </label>

  <label
    class="flex items-center justify-between gap-4"
    :class="{ 'opacity-40 pointer-events-none': !showUpcoming }"
  >
    <div>
      <div class="font-medium text-sm">Show empty state</div>
      <div class="text-xs text-base-content/60">Display "No upcoming events today." when the list is empty.</div>
    </div>
    <input
      type="checkbox"
      class="toggle toggle-sm toggle-primary"
      x-model="showEmpty"
      @change="save('show_upcoming_empty', showEmpty)"
      :disabled="!showUpcoming"
    >
  </label>

  <div
    class="pt-3 border-t border-base-300"
    x-init="$nextTick(() => window.lucide && window.lucide.createIcons())"
  >
    <div class="font-medium text-sm">Apps</div>
    <div class="text-xs text-base-content/60 mb-3">Choose which apps appear on your dashboard.</div>
    <div class="space-y-2 max-h-72 overflow-y-auto">
      <template x-for="app in apps" :key="app.slug">
        <label class="flex items-center justify-between gap-4">
          <div class="flex items-center gap-2">
            <span
              class="w-7 h-7 rounded-lg flex items-center justify-center"
              :class="`bg-${app.color}/10 text-${app.color}`"
            >
              <i :data-lucide="app.icon" class="w-4 h-4"></i>
            </span>
            <span class="font-medium text-sm" x-text="app.name"></span>
          </div>
          <input
            type="checkbox"
            class="toggle toggle-sm toggle-primary"
            :checked="isVisible(app.slug)"
            @change="toggleApp(app.slug, $event.target.checked)"
          >
        </label>
      </template>
    </div>
  </div>
</div>
