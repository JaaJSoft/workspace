<li class="py-3 flex items-center gap-3">
  <div class="w-9 h-9 rounded-lg bg-{{ event.source_color }}/10 flex items-center justify-center flex-shrink-0">
    <i data-lucide="{{ event.icon }}" class="w-4 h-4 text-{{ event.source_color }}"></i>
  </div>
  <div class="flex-1 min-w-0">
    <div class="flex items-center gap-2">
      <div class="font-medium truncate min-w-0">{{ event.description }}</div>
      <span class="badge badge-ghost badge-xs whitespace-nowrap flex-shrink-0">{{ event.label }}</span>
    </div>
    <div class="text-xs text-base-content/60 truncate flex items-center gap-1">
      {% if event.actor %}
        {% include "ui/partials/user_identity.html" with user=event.actor %} &middot;
      {% endif %}
      {{ event.time_ago }}
    </div>
  </div>
  <div class="flex-shrink-0">
    <a href="{{ event.url }}" class="btn btn-ghost btn-xs">View</a>
  </div>
</li>
