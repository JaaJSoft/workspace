{% load ui_filters %}

<div class="space-y-1">
  <div class="text-xs font-semibold uppercase tracking-wider text-base-content/50 mb-2 flex items-center gap-1.5">
    Workspace usage
    <span class="tooltip tooltip-bottom cursor-help" data-tip="Storage quota is indicative and not enforced.">
      <i data-lucide="info" class="w-3 h-3 text-base-content/40"></i>
    </span>
  </div>

  <a href="/files" class="flex items-center gap-3 rounded-lg px-2 py-2 -mx-2 min-h-[3.25rem] hover:bg-base-200 transition-colors group">
    <div class="rounded-lg bg-primary/10 p-2 flex-shrink-0">
      <i data-lucide="hard-drive" class="w-4 h-4 text-primary"></i>
    </div>
    <div class="flex-1 min-w-0">
      <div class="text-sm font-medium group-hover:text-primary transition-colors">Files</div>
      <div class="w-full bg-base-300 rounded-full h-1.5 mt-1">
        <div class="bg-primary rounded-full h-1.5 transition-all duration-700" x-ref="storageBar" style="width: 0%"></div>
      </div>
      <div class="text-xs text-base-content/50 mt-0.5">{{ usage_stats.files.total_size|default:"0"|filesize }} / {{ storage_quota|filesize }}</div>
    </div>
    <div class="font-semibold text-sm flex-shrink-0" x-ref="countFiles" data-target="{{ usage_stats.files.total_files|default:"0" }}">0</div>
  </a>

  <a href="/chat" class="flex items-center gap-3 rounded-lg px-2 py-2 -mx-2 min-h-[3.25rem] hover:bg-base-200 transition-colors group">
    <div class="rounded-lg bg-info/10 p-2 flex-shrink-0">
      <i data-lucide="message-circle" class="w-4 h-4 text-info"></i>
    </div>
    <div class="flex-1 min-w-0">
      <div class="text-sm font-medium group-hover:text-info transition-colors">Messages</div>
    </div>
    <div class="font-semibold text-sm flex-shrink-0" x-ref="countMessages" data-target="{{ usage_stats.chat.total_messages|default:"0" }}">0</div>
  </a>

  <a href="/mail" class="flex items-center gap-3 rounded-lg px-2 py-2 -mx-2 min-h-[3.25rem] hover:bg-base-200 transition-colors group">
    <div class="rounded-lg bg-warning/10 p-2 flex-shrink-0">
      <i data-lucide="mail" class="w-4 h-4 text-warning"></i>
    </div>
    <div class="flex-1 min-w-0">
      <div class="text-sm font-medium group-hover:text-warning transition-colors">Mail</div>
      {% if usage_stats.mail.unread_messages %}<div class="text-xs text-base-content/50">{{ usage_stats.mail.unread_messages }} unread</div>{% endif %}
    </div>
    <div class="font-semibold text-sm flex-shrink-0" x-ref="countMail" data-target="{{ usage_stats.mail.total_messages|default:"0" }}">0</div>
  </a>

  <a href="/calendar" class="flex items-center gap-3 rounded-lg px-2 py-2 -mx-2 min-h-[3.25rem] hover:bg-base-200 transition-colors group">
    <div class="rounded-lg bg-accent/10 p-2 flex-shrink-0">
      <i data-lucide="calendar" class="w-4 h-4 text-accent"></i>
    </div>
    <div class="flex-1 min-w-0">
      <div class="text-sm font-medium group-hover:text-accent transition-colors">Events</div>
    </div>
    <div class="font-semibold text-sm flex-shrink-0" x-ref="countEvents" data-target="{{ usage_stats.calendar.total_events|default:"0" }}">0</div>
  </a>
</div>
