<div class="p-3 w-72">
  <div class="flex items-start gap-3 mb-2">
    <i data-lucide="file-text" class="w-4 h-4 flex-shrink-0 mt-0.5 text-base-content/60"></i>
    <div class="min-w-0 flex-1">
      <div class="font-semibold text-sm truncate">{{ file.name }}</div>
      {% with tags=file.file_tags.all %}
      {% if tags %}
      <div class="flex flex-wrap gap-1 mt-1">
        {% for ft in tags %}
        <span class="badge badge-xs badge-ghost gap-1">
          {% if ft.tag.icon %}<i data-lucide="{{ ft.tag.icon }}" class="w-2.5 h-2.5"></i>{% endif %}
          {{ ft.tag.name }}
        </span>
        {% endfor %}
      </div>
      {% endif %}
      {% endwith %}
    </div>
  </div>

  {% if first_line %}
  <p class="text-xs text-base-content/60 mb-3 line-clamp-2">{{ first_line }}</p>
  {% endif %}

  <div class="flex gap-1.5">
    <a href="/notes?file={{ file.uuid }}" class="btn btn-ghost btn-xs flex-1 gap-1">
      <i data-lucide="eye" class="w-3 h-3"></i>
      Open
    </a>
  </div>
</div>
