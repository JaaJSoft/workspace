<!-- Share Modal -->
<div x-data="shareModal()">
  <dialog x-ref="shareDialog" class="modal" @close="closeModal()">
    <div class="modal-box max-w-md">
      <!-- Header -->
      <div class="flex items-center gap-3 mb-4">
        <div class="bg-secondary/10 rounded-lg p-2">
          <i data-lucide="share-2" class="w-5 h-5 text-secondary"></i>
        </div>
        <div>
          <h3 class="font-bold text-lg">Share</h3>
          <p class="text-sm text-base-content/60 truncate max-w-[300px]" x-text="fileName"></p>
        </div>
      </div>

      <!-- User search -->
      <div class="mb-4">
        <label class="text-sm font-medium mb-1 block">Add people</label>
        {% include "ui/partials/user_selector.html" with on_select_event="share-user-selected" placeholder="Search by username or name..." %}
      </div>

      <!-- Current shares list -->
      <div class="mb-4">
        <label class="text-sm font-medium mb-2 block">Shared with</label>
        <div class="space-y-1 max-h-48 overflow-y-auto">
          <!-- Loading -->
          <div x-show="loading" class="flex justify-center py-4">
            <span class="loading loading-spinner loading-sm"></span>
          </div>

          <!-- Empty state -->
          <div x-show="!loading && displayList.length === 0" class="text-sm text-base-content/60 text-center py-4">
            Not shared with anyone yet
          </div>

          <!-- Share entries -->
          <template x-for="entry in displayList" :key="entry.id">
            <div
              class="flex items-center gap-2 p-2 rounded-lg group"
              :class="entry._removed ? 'bg-error/5 opacity-50' : 'hover:bg-base-200'"
            >
              <div class="flex-shrink-0" x-html="userAvatarWithCardHtml(entry.id, entry.username, 'w-8 h-8 text-sm')"></div>
              <div class="flex-1 min-w-0">
                <div class="font-medium text-sm truncate" :class="entry._removed ? 'line-through' : ''" x-text="entry.username"></div>
                <div
                  class="text-xs text-base-content/60 truncate"
                  x-show="entry.first_name || entry.last_name"
                  x-text="((entry.first_name || '') + ' ' + (entry.last_name || '')).trim()"
                ></div>
              </div>
              <template x-if="!entry._removed">
                <select
                  class="select select-xs select-bordered w-24"
                  :value="entry.permission || 'ro'"
                  @change="stagePermissionChange(entry.id, $event.target.value, entry._pending)"
                >
                  <option value="ro">Read only</option>
                  <option value="rw">Read & write</option>
                </select>
              </template>
              <template x-if="entry._pending && !entry._removed">
                <span class="badge badge-sm badge-info">New</span>
              </template>
              <template x-if="entry._removed">
                <button
                  type="button"
                  class="btn btn-ghost btn-xs"
                  title="Undo removal"
                  @click="undoRemove(entry.id)"
                >Undo</button>
              </template>
              <template x-if="!entry._removed">
                <button
                  type="button"
                  class="btn btn-ghost btn-xs btn-square text-error"
                  title="Remove access"
                  @click="stageRemove(entry.id)"
                >&times;</button>
              </template>
            </div>
          </template>
        </div>
      </div>

      <!-- Share Links -->
      <div class="mb-4">
        <div class="divider my-2 text-xs text-base-content/40">Public links</div>

        <!-- Loading -->
        <div x-show="linksLoading" class="flex justify-center py-2">
          <span class="loading loading-spinner loading-sm"></span>
        </div>

        <!-- Links list -->
        <div class="space-y-2" x-show="!linksLoading">
          <template x-for="link in shareLinks" :key="link.uuid">
            <div class="flex items-center gap-2 p-2 rounded-lg hover:bg-base-200 text-sm">
              <i data-lucide="link" class="w-4 h-4 text-primary flex-shrink-0"></i>
              <div class="flex-1 min-w-0">
                <div class="font-mono text-xs truncate" x-text="link.url"></div>
                <div class="flex items-center gap-2 text-xs text-base-content/50">
                  <span x-text="formatLinkExpiry(link.expires_at)"></span>
                  <template x-if="link.has_password">
                    <span class="flex items-center gap-0.5"><i data-lucide="lock" class="w-3 h-3"></i> Password</span>
                  </template>
                </div>
              </div>
              <button type="button" class="btn btn-ghost btn-xs btn-square" title="Copy link" @click="copyShareLink(link.url)">
                <i data-lucide="copy" class="w-3.5 h-3.5"></i>
              </button>
              <button type="button" class="btn btn-ghost btn-xs btn-square text-error" title="Revoke" @click="deleteShareLink(link.uuid)">
                <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
              </button>
            </div>
          </template>

          <div x-show="!linksLoading && shareLinks.length === 0 && !showLinkForm" class="text-sm text-base-content/60 text-center py-2">
            No public links
          </div>
        </div>

        <!-- Create form -->
        <template x-if="showLinkForm">
          <div class="mt-2 p-3 bg-base-200 rounded-lg space-y-2">
            <div class="form-control">
              <label class="label py-0.5"><span class="label-text text-xs">Expiration (optional)</span></label>
              <input type="date" class="input input-bordered input-sm" x-model="newLinkExpiry" />
            </div>
            <div class="form-control">
              <label class="label py-0.5"><span class="label-text text-xs">Password (optional)</span></label>
              <input type="password" class="input input-bordered input-sm" x-model="newLinkPassword" placeholder="Leave empty for no password" />
            </div>
            <div class="flex gap-2 justify-end">
              <button type="button" class="btn btn-ghost btn-xs" @click="showLinkForm = false">Cancel</button>
              <button type="button" class="btn btn-primary btn-xs" @click="createShareLink()" :disabled="creatingLink">
                <span x-show="creatingLink" class="loading loading-spinner loading-xs"></span>
                Create
              </button>
            </div>
          </div>
        </template>

        <!-- Create button -->
        <button
          type="button"
          class="btn btn-ghost btn-xs gap-1 mt-2"
          x-show="!showLinkForm"
          @click="showLinkForm = true"
        >
          <i data-lucide="plus" class="w-3.5 h-3.5"></i>
          Create link
        </button>
      </div>

      <!-- Footer -->
      <div class="modal-action">
        <button type="button" class="btn btn-sm btn-ghost" @click="closeModal()">Cancel</button>
        <button
          type="button"
          class="btn btn-sm btn-primary"
          :disabled="!hasChanges || saving"
          @click="save()"
        >
          <span x-show="saving" class="loading loading-spinner loading-xs"></span>
          <span x-text="saving ? 'Saving...' : 'Save'"></span>
        </button>
      </div>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
  </dialog>
</div>
