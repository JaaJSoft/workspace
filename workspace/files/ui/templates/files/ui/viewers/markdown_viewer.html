<!-- Markdown WYSIWYG Editor with Milkdown Crepe -->
<div class="flex flex-col h-full"
     x-data="markdownViewerCrepe()"
     x-init="initEditor()"
     @viewer-cleanup.window="dispose()">

  <!-- Toolbar -->
  <div class="flex items-center justify-between gap-1 px-3 py-1.5 bg-base-100 border-b border-base-300">
    <div class="flex items-center gap-2 min-w-0">
      <span class="badge badge-sm badge-ghost font-mono">markdown</span>
      {% if can_edit %}
      <!-- Modified -->
      <span x-show="saveStatus === 'modified'" x-cloak
            class="flex items-center gap-1 text-warning text-xs whitespace-nowrap">
        <span class="w-1.5 h-1.5 rounded-full bg-warning inline-block"></span>
        Modified
      </span>
      <!-- Saving -->
      <span x-show="saveStatus === 'saving'" x-cloak
            class="flex items-center gap-1 text-base-content/60 text-xs whitespace-nowrap">
        <span class="loading loading-spinner loading-xs"></span>
        Saving...
      </span>
      <!-- Saved -->
      <span x-show="saveStatus === 'saved'" x-cloak
            class="flex items-center gap-1 text-success text-xs whitespace-nowrap"
            x-transition:leave="transition ease-in duration-300"
            x-transition:leave-start="opacity-100"
            x-transition:leave-end="opacity-0">
        <i data-lucide="check" class="w-3.5 h-3.5"></i>
        Saved
      </span>
      <!-- Error -->
      <span x-show="saveStatus === 'error'" x-cloak
            class="flex items-center gap-1 text-error text-xs whitespace-nowrap">
        <i data-lucide="alert-circle" class="w-3.5 h-3.5"></i>
        Save failed
      </span>
      {% endif %}
    </div>
    {% if can_edit %}
    <div class="flex items-center gap-0.5">
      <!-- Retry (only on error) -->
      <button x-show="saveStatus === 'error'" x-cloak
              type="button"
              class="btn btn-error btn-xs"
              @click="save()">
        <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i>
        Retry
      </button>
      <!-- Save -->
      <button type="button"
              class="btn btn-ghost btn-xs"
              :disabled="!isDirty || saveStatus === 'saving'"
              @click="save()"
              title="Save (Ctrl+S)">
        <i data-lucide="save" class="w-3.5 h-3.5"></i>
      </button>
    </div>
    {% endif %}
  </div>

  <!-- Lock banner -->
  <div x-show="lockOwner" x-cloak
       class="flex items-center gap-2 px-3 py-2 bg-warning/10 border-b border-warning/30 text-warning-content text-sm">
    <i data-lucide="lock" class="w-4 h-4 text-warning shrink-0"></i>
    <span class="flex-1"><strong x-text="lockOwner"></strong> is editing this file</span>
    <button type="button" class="btn btn-warning btn-xs" @click="forceUnlock()">Force unlock</button>
  </div>

  <!-- Loading State -->
  <div x-show="loading" class="flex-1 flex items-center justify-center" x-cloak>
    <span class="loading loading-spinner loading-lg"></span>
  </div>

  <!-- Error State -->
  <div x-show="!loading && error" class="flex-1 flex items-center justify-center p-8" x-cloak>
    <div class="text-center">
      <i data-lucide="alert-circle" class="w-12 h-12 text-error mx-auto mb-4"></i>
      <p class="text-lg font-medium mb-2">Failed to load editor</p>
      <p class="text-sm text-base-content/60" x-text="error"></p>
    </div>
  </div>

  <!-- Milkdown Crepe Container -->
  <div x-ref="crepeContainer"
       x-show="!loading && !error"
       class="flex-1 min-h-0 overflow-auto flex flex-col"
       x-cloak></div>
</div>

<script>
window.markdownViewerCrepe = function() {
  // Keep complex objects OUT of Alpine's reactive scope
  let _crepe = null;
  let _keydownHandler = null;
  let _container = null;
  let _lock = null;
  let _savedFadeTimer = null;
  let _listenerAttached = false;
  let _debounceTimer = null;
  let _intervalTimer = null;
  let _beforeUnloadHandler = null;

  function getCSRFToken() {
    const match = document.cookie.split('; ').find(function(row) { return row.startsWith('csrftoken='); });
    return match ? match.split('=')[1] : '';
  }

  function _clearAutosave() {
    if (_debounceTimer) {
      clearTimeout(_debounceTimer);
      _debounceTimer = null;
    }
    if (_intervalTimer) {
      clearInterval(_intervalTimer);
      _intervalTimer = null;
    }
  }

  function _scheduleAutosave(self) {
    // Debounce: reset 2s timer on every change
    if (_debounceTimer) clearTimeout(_debounceTimer);
    _debounceTimer = setTimeout(function() {
      _debounceTimer = null;
      if (self.isDirty && self.saveStatus !== 'saving') self.save();
    }, 2000);

    // Safety interval: start 30s timer if not already running
    if (!_intervalTimer) {
      _intervalTimer = setInterval(function() {
        if (self.isDirty && self.saveStatus !== 'saving') {
          self.save();
        }
      }, 30000);
    }
  }

  function _attachEditHandlers(self, container) {
    if (!_listenerAttached) {
      _listenerAttached = true;
      _crepe.on(function(listener) {
        listener.markdownUpdated(function(md) {
          const dirty = md !== self.originalContent;
          self.isDirty = dirty;
          if (dirty) {
            self.setSaveStatus('modified');
            _scheduleAutosave(self);
          } else if (self.saveStatus === 'error' || self.saveStatus === 'modified') {
            self.setSaveStatus(null);
          }
        });
      });
    }
    if (!_keydownHandler) {
      _keydownHandler = function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
          e.preventDefault();
          self.save();
        }
      };
      container.addEventListener('keydown', _keydownHandler, true);
    }
  }

  return {
    canEdit: {{ can_edit|yesno:'true,false' }},
    isDirty: false,
    saveStatus: null, // null | 'modified' | 'saving' | 'saved' | 'error'
    loading: true,
    error: null,
    originalContent: '{{ content|escapejs }}',
    fileUuid: '{{ file.uuid }}',
    fileName: '{{ file.name }}',
    lockOwner: {% if lock_info %}'{{ lock_info.locked_by_username|escapejs }}'{% else %}null{% endif %},

    setSaveStatus(status) {
      if (_savedFadeTimer) {
        clearTimeout(_savedFadeTimer);
        _savedFadeTimer = null;
      }
      this.saveStatus = status;
      if (status === 'saved') {
        const self = this;
        _savedFadeTimer = setTimeout(function() {
          if (self.saveStatus === 'saved') self.saveStatus = null;
          _savedFadeTimer = null;
        }, 2000);
      }
    },

    async initEditor() {
      const container = this.$refs.crepeContainer;
      const self = this;
      _container = container;
      _lock = window.fileLock(this.fileUuid, getCSRFToken);

      try {
        const mod = await import('https://esm.sh/@milkdown/crepe@7.17.3?bundle');
        const Crepe = mod.Crepe;

        _crepe = new Crepe({ root: container, defaultValue: self.originalContent });
        await _crepe.create();

        if (!self.canEdit || self.lockOwner) {
          _crepe.setReadonly(true);
        }

        self.originalContent = _crepe.getMarkdown();

        if (self.canEdit && !self.lockOwner) {
          _attachEditHandlers(self, container);
        }

        self.loading = false;

        if (self.canEdit) {
          _beforeUnloadHandler = function(e) {
            if (self.isDirty) e.preventDefault();
          };
          window.addEventListener('beforeunload', _beforeUnloadHandler);

          _lock.acquire(self, {
            onLocked: function() {
              _clearAutosave();
              if (_crepe) {
                if (self.isDirty) {
                  // Attempt one final save before going readonly
                  self.save({ force: true }).then(function() {
                    if (_crepe) _crepe.setReadonly(true);
                    if (self.saveStatus === 'error' && window.AppAlert) {
                      window.AppAlert.warning('Unsaved changes could not be saved — another user locked the file.');
                    }
                  });
                } else {
                  _crepe.setReadonly(true);
                }
              }
            },
            onAcquired: function() {
              if (_crepe) {
                _crepe.setReadonly(false);
                _attachEditHandlers(self, container);
              }
            },
          });
        }
      } catch (err) {
        console.error('Failed to load Milkdown:', err);
        self.error = err.message || 'Failed to load editor';
        self.loading = false;
      }
    },

    forceUnlock() {
      const self = this;
      _lock.forceUnlock(self, {
        onAcquired: function() {
          if (_crepe) {
            _crepe.setReadonly(false);
            _attachEditHandlers(self, _container);
          }
        },
      });
    },

    async save(opts) {
      const force = opts && opts.force;
      if (!_crepe || this.saveStatus === 'saving' || !this.isDirty) return;
      if (!force && this.lockOwner) return;
      this.setSaveStatus('saving');

      try {
        const content = _crepe.getMarkdown();
        const blob = new Blob([content], { type: 'text/markdown' });
        const formData = new FormData();
        formData.append('content', blob, this.fileName || 'file.md');

        const response = await fetch('/api/v1/files/' + this.fileUuid, {
          method: 'PATCH',
          headers: { 'X-CSRFToken': getCSRFToken() },
          body: formData,
        });

        if (!response.ok) throw new Error('Failed to save');

        this.originalContent = content;
        this.isDirty = false;
        this.setSaveStatus('saved');
        _clearAutosave();
      } catch (error) {
        console.error('Failed to save:', error);
        this.setSaveStatus('error');
        // Clear debounce but keep the safety interval running for auto-retry.
        if (_debounceTimer) {
          clearTimeout(_debounceTimer);
          _debounceTimer = null;
        }
      }
    },

    dispose() {
      if (_savedFadeTimer) {
        clearTimeout(_savedFadeTimer);
        _savedFadeTimer = null;
      }
      _listenerAttached = false;
      _clearAutosave();
      if (_beforeUnloadHandler) {
        window.removeEventListener('beforeunload', _beforeUnloadHandler);
        _beforeUnloadHandler = null;
      }
      if (_lock) _lock.dispose();
      if (_keydownHandler && _container) {
        _container.removeEventListener('keydown', _keydownHandler, true);
        _keydownHandler = null;
        _container = null;
      }
      if (_crepe) {
        _crepe.destroy();
        _crepe = null;
      }
    },
  };
};
</script>
