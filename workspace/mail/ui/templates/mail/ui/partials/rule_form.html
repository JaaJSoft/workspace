<dialog class="modal" :open="editing !== null">
  <div class="modal-box max-w-2xl">
    <template x-if="editing !== null">
      <div>
        <div class="flex items-center justify-between mb-4">
          <h3 class="font-bold text-lg" x-text="editing.uuid ? 'Edit rule' : 'New rule'"></h3>
          <div class="tabs tabs-boxed">
            <button class="tab" :class="formMode === 'simple' ? 'tab-active' : ''" @click="setMode('simple')">Simple</button>
            <button class="tab" :class="formMode === 'advanced' ? 'tab-active' : ''" @click="setMode('advanced')">Advanced</button>
          </div>
        </div>

        <div class="space-y-3">
          <input type="text" class="input input-bordered w-full" placeholder="Rule name" x-model="editing.name" />

          <div x-show="formMode === 'simple'" class="space-y-2">
            <div class="text-sm font-semibold">When</div>
            <div class="flex gap-2">
              <select class="select select-bordered select-sm" x-model="simpleCondition.field">
                <template x-for="f in conditionFields" :key="f.value">
                  <option :value="f.value" x-text="f.label"></option>
                </template>
              </select>
              <select class="select select-bordered select-sm" x-model="simpleCondition.op">
                <template x-for="o in compatibleOps(simpleCondition.field)" :key="o">
                  <option :value="o" x-text="o.replace('_', ' ')"></option>
                </template>
              </select>
              <input x-show="needsValue(simpleCondition.op)" type="text" class="input input-bordered input-sm flex-1" x-model="simpleCondition.value" />
            </div>

            <div class="text-sm font-semibold mt-3">Then</div>
            <div class="flex gap-2">
              <select class="select select-bordered select-sm" x-model="simpleAction.type">
                <option value="mark_read">Mark as read</option>
                <option value="mark_unread">Mark as unread</option>
                <option value="star">Star</option>
                <option value="unstar">Unstar</option>
                <option value="add_label">Add label</option>
                <option value="remove_label">Remove label</option>
                <option value="move_to_folder">Move to folder</option>
                <option value="delete">Delete</option>
              </select>
              <select x-show="simpleAction.type === 'add_label' || simpleAction.type === 'remove_label'"
                      class="select select-bordered select-sm flex-1" x-model="simpleAction.label_id">
                <template x-for="lbl in accountLabels()" :key="lbl.uuid">
                  <option :value="lbl.uuid" x-text="lbl.name"></option>
                </template>
              </select>
              <select x-show="simpleAction.type === 'move_to_folder'"
                      class="select select-bordered select-sm flex-1" x-model="simpleAction.folder_id">
                <template x-for="f in accountFolders()" :key="f.uuid">
                  <option :value="f.uuid" x-text="f.display_name"></option>
                </template>
              </select>
            </div>
          </div>

          <div x-show="formMode === 'advanced'" class="space-y-2">
            <div class="text-sm font-semibold">Conditions (JSON tree)</div>
            <textarea class="textarea textarea-bordered w-full font-mono text-xs" rows="6"
                      x-model="advancedConditionsText"
                      @input="syncAdvancedConditions()"></textarea>

            <div class="text-sm font-semibold mt-3">Actions (JSON list)</div>
            <textarea class="textarea textarea-bordered w-full font-mono text-xs" rows="4"
                      x-model="advancedActionsText"
                      @input="syncAdvancedActions()"></textarea>

            <div x-show="advancedError" class="text-error text-xs" x-text="advancedError"></div>
          </div>

          <label class="flex items-center gap-2 mt-3">
            <input type="checkbox" class="checkbox checkbox-sm" x-model="editing.is_enabled" />
            <span class="text-sm">Enabled</span>
          </label>
          <label class="flex items-center gap-2">
            <input type="checkbox" class="checkbox checkbox-sm" x-model="editing.stop_processing" />
            <span class="text-sm">Stop processing more rules after this one</span>
          </label>
        </div>

        <div class="modal-action">
          <button class="btn btn-ghost" @click="cancelEdit()">Cancel</button>
          <button class="btn btn-primary" @click="saveRule()" :disabled="!editing.name">Save</button>
        </div>
      </div>
    </template>
  </div>
</dialog>
