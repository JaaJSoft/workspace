<!-- Notes sidebar context menu -->
<div
  x-show="ctxMenu.open" x-cloak
  class="fixed z-[100] shadow-xl bg-base-100 border border-base-300 rounded-lg w-52 p-1"
  :style="'top:' + ctxMenu.y + 'px; left:' + ctxMenu.x + 'px'"
  @click.outside="closeCtxMenu()"
  @keydown.escape.window="closeCtxMenu()"
>
  <!-- Folder actions -->
  <template x-if="ctxMenu.type === 'folder'">
    <ul class="menu menu-sm p-0">
      <li>
        <button type="button" class="gap-3 rounded" @click="ctxAction('rename')">
          <i data-lucide="pencil" class="w-4 h-4"></i>
          <span>Rename</span>
        </button>
      </li>
      <li>
        <button type="button" class="gap-3 rounded" @click="ctxAction('hide')">
          <i data-lucide="eye-off" class="w-4 h-4"></i>
          <span>Hide from sidebar</span>
        </button>
      </li>
      <hr class="my-1 border-base-300">
      <li>
        <button type="button" class="gap-3 rounded text-error" @click="ctxAction('delete')">
          <i data-lucide="trash-2" class="w-4 h-4"></i>
          <span>Delete</span>
        </button>
      </li>
    </ul>
  </template>

  <!-- Tag actions -->
  <template x-if="ctxMenu.type === 'tag'">
    <ul class="menu menu-sm p-0">
      <li>
        <button type="button" class="gap-3 rounded" @click="ctxAction('edit')">
          <i data-lucide="pencil" class="w-4 h-4"></i>
          <span>Edit</span>
        </button>
      </li>
      <li>
        <button type="button" class="gap-3 rounded" @click="ctxAction('hide')">
          <i data-lucide="eye-off" class="w-4 h-4"></i>
          <span>Hide from sidebar</span>
        </button>
      </li>
      <hr class="my-1 border-base-300">
      <li>
        <button type="button" class="gap-3 rounded text-error" @click="ctxAction('delete')">
          <i data-lucide="trash-2" class="w-4 h-4"></i>
          <span>Delete</span>
        </button>
      </li>
    </ul>
  </template>
</div>
