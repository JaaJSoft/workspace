<!-- Notes sidebar context menu -->
<div
  x-show="ctxMenu.open" x-cloak
  class="fixed z-[100] shadow-xl bg-base-100 border border-base-300 rounded-lg w-52 p-1"
  :style="'top:' + ctxMenu.y + 'px; left:' + ctxMenu.x + 'px'"
  @click.outside="closeCtxMenu()"
  @keydown.escape.window="closeCtxMenu()"
>
  <!-- Folder / Group folder actions (dynamic via API) -->
  <ul class="menu menu-sm p-0" x-show="ctxMenu.type === 'folder' || ctxMenu.type === 'group_folder'">
    <!-- Loading state -->
    <li x-show="ctxMenu.actions === null">
      <span class="gap-3 rounded pointer-events-none">
        <span class="loading loading-spinner loading-xs"></span>
        <span>Loading…</span>
      </span>
    </li>
    <!-- Dynamic actions from API -->
    <template x-for="(action, idx) in (ctxMenu.actions || [])" :key="action.id">
      <li :class="idx > 0 && action.category !== ctxMenu.actions[idx-1].category ? 'mt-0.5 pt-0.5 border-t border-base-300' : ''">
        <button type="button" class="gap-3 rounded" :class="action.css_class || ''"
                @click="ctxFolderAction(action)">
          <i :data-lucide="action.icon" class="w-4 h-4"></i>
          <span x-text="action.label"></span>
        </button>
      </li>
    </template>
    <!-- Notes-specific actions (always present after API actions) -->
    <template x-if="ctxMenu.actions !== null">
      <li class="mt-0.5 pt-0.5 border-t border-base-300">
        <button type="button" class="gap-3 rounded" @click="ctxAction('hide')">
          <i data-lucide="eye" class="w-4 h-4" x-show="isHidden(ctxMenu.data?.uuid)" x-cloak></i>
          <i data-lucide="eye-off" class="w-4 h-4" x-show="!isHidden(ctxMenu.data?.uuid)"></i>
          <span x-text="isHidden(ctxMenu.data?.uuid) ? 'Show in sidebar' : 'Hide from sidebar'"></span>
        </button>
      </li>
    </template>
    <template x-if="ctxMenu.actions !== null">
      <li>
        <a :href="'/files/' + ctxMenu.data?.uuid" class="gap-3 rounded" @click="closeCtxMenu()">
          <i data-lucide="hard-drive" class="w-4 h-4"></i>
          <span>Open in Files</span>
        </a>
      </li>
    </template>
  </ul>

  <!-- Tag actions -->
  <ul class="menu menu-sm p-0" x-show="ctxMenu.type === 'tag'">
    <li>
      <button type="button" class="gap-3 rounded" @click="ctxAction('edit')">
        <i data-lucide="pencil" class="w-4 h-4"></i>
        <span>Edit</span>
      </button>
    </li>
    <li>
      <button type="button" class="gap-3 rounded" @click="ctxAction('hide')">
        <i data-lucide="eye" class="w-4 h-4" x-show="isHidden(ctxMenu.data?.uuid)" x-cloak></i>
        <i data-lucide="eye-off" class="w-4 h-4" x-show="!isHidden(ctxMenu.data?.uuid)"></i>
        <span x-text="isHidden(ctxMenu.data?.uuid) ? 'Show in sidebar' : 'Hide from sidebar'"></span>
      </button>
    </li>
    <hr class="my-1 border-base-300">
    <li>
      <button type="button" class="gap-3 rounded text-error" @click="ctxAction('delete')">
        <i data-lucide="trash-2" class="w-4 h-4"></i>
        <span>Delete</span>
      </button>
    </li>
  </ul>
</div>
