<div class="flex flex-col h-full w-full bg-base-100">
  <!-- Toolbar: controls live here (not floating over the canvas), so the graph
       gets the full area below. Two rows, like the note-list header + filters. -->
  <div class="flex-shrink-0 border-b border-base-300">
    <!-- Row 1: mobile menu toggle + title + scope -->
    <div class="flex items-center gap-2 px-3 pt-3 pb-2">
      {% include "ui/partials/drawer_toggle.html" with drawer_id="notes-drawer" class="lg:hidden" %}
      <h3 class="text-sm font-semibold text-base-content/60 truncate flex-1" x-text="viewTitle"></h3>
      <div class="join w-36 flex-shrink-0">
        <button class="btn btn-xs join-item flex-1"
                :class="graphScope === 'mine' ? 'btn-success' : 'btn-ghost'"
                @click="setGraphScope('mine')">My notes</button>
        <button class="btn btn-xs join-item flex-1"
                :class="graphScope === 'all' ? 'btn-success' : 'btn-ghost'"
                @click="setGraphScope('all')">All</button>
      </div>
    </div>
    <!-- Row 2: search + kind + legend popover -->
    <div class="flex items-center gap-2 px-3 pb-3">
      <!-- search + kind grouped on the left; the group grows so the legend
           popover sits at the far right of the toolbar -->
      <div class="flex items-center gap-2 flex-1 min-w-0">
        <div class="relative flex-1 min-w-0 max-w-xs">
          <i data-lucide="search" class="w-3.5 h-3.5 absolute left-2.5 top-1/2 -translate-y-1/2 text-base-content/40"></i>
          <input type="text" class="input input-sm input-bordered w-full pl-8" placeholder="Search notes..."
                 x-model="graphSearch" @input.debounce.200ms="onGraphSearch()">
        </div>
        <select class="select select-sm select-bordered flex-shrink-0"
                x-model="graphKind" @change="setGraphKind($event.target.value)">
          <option value="all">All notes</option>
          <option value="favorite">Favorites</option>
          <option value="journal">Journal</option>
          <option value="regular">Regular notes</option>
        </select>
      </div>
      <button class="btn btn-ghost btn-sm btn-square flex-shrink-0" @click="resetGraphView()"
              aria-label="Reset view" title="Reset view">
        <i data-lucide="maximize" class="w-4 h-4"></i>
      </button>
      <div class="dropdown dropdown-end flex-shrink-0">
        <button tabindex="0" class="btn btn-ghost btn-sm btn-square" aria-label="Legend" title="Legend">
          <i data-lucide="info" class="w-4 h-4"></i>
        </button>
        <div tabindex="0" class="dropdown-content z-50 bg-base-100 rounded-box shadow-lg ring-1 ring-base-300 p-3 mt-1 w-40 text-xs space-y-1.5">
          <div class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full bg-warning"></span> Favorite</div>
          <div class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full bg-success"></span> Journal</div>
          <div class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full bg-base-content/50"></span> Note</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Canvas mount (force-graph draws here, sized to this area by notes.js) -->
  <div class="relative flex-1 min-h-0">
    <div x-ref="graphCanvas" class="absolute inset-0"></div>
  </div>
</div>
