<!-- Note list header -->
<div class="flex items-center gap-2 p-3 border-b border-base-300">
  <!-- Mobile sidebar toggle -->
  <label for="notes-drawer" class="btn btn-ghost btn-sm btn-square lg:hidden cursor-pointer">
    <i data-lucide="menu" class="w-5 h-5"></i>
  </label>
  <h3 class="text-sm font-semibold text-base-content/60 truncate flex-1" x-text="viewTitle"></h3>
  <button class="btn btn-ghost btn-sm lg:btn-xs btn-circle" @click="createNote()" title="New note"
          x-show="['all', 'folder', 'group_folder'].includes(activeView)" x-cloak>
    <i data-lucide="plus" class="w-4 h-4"></i>
  </button>
  <button class="btn btn-ghost btn-sm lg:btn-xs btn-circle" @click="applyFilters()" title="Refresh"
          :disabled="loadingNotes">
    <i data-lucide="refresh-cw" class="w-3.5 h-3.5" x-show="!loadingNotes"></i>
    <span class="loading loading-spinner loading-xs" x-show="loadingNotes" x-cloak></span>
  </button>
</div>

<!-- Filter bar -->
<div class="px-3 py-2 border-b border-base-300 bg-base-100/80 space-y-1.5">
  <!-- Search input -->
  <div class="relative">
    <i data-lucide="search" class="w-3.5 h-3.5 absolute left-2.5 top-1/2 -translate-y-1/2 text-base-content/40"></i>
    <input type="text"
           class="input input-xs input-bordered w-full pl-8 pr-7 text-sm"
           placeholder="Search notes..."
           x-model="filters.search"
           @input="onSearchInput()"
           @keydown.escape.stop="filters.search = ''; applyFilters()"
    />
    <button class="absolute right-1.5 top-1/2 -translate-y-1/2 btn btn-ghost btn-circle btn-xs"
            x-show="filters.search" x-cloak
            @click="filters.search = ''; applyFilters()">
      <i data-lucide="x" class="w-3 h-3"></i>
    </button>
  </div>
  <!-- Toggle filters -->
  <div class="flex items-center gap-1.5 flex-wrap">
    <button class="btn btn-xs gap-1"
            :class="filters.favorites ? 'btn-warning' : 'btn-ghost'"
            @click="toggleFilter('favorites')"
            x-show="activeView !== 'favorites'" x-cloak>
      <i data-lucide="star" class="w-3 h-3"></i> Favorites
    </button>
    <!-- Tag multi-select dropdown -->
    <div class="relative" x-show="allTags.length > 0" @click.outside="showTagDropdown = false">
      <button class="btn btn-xs gap-1"
              :class="filters.tags.length > 0 ? 'btn-secondary' : 'btn-ghost'"
              @click="showTagDropdown = !showTagDropdown">
        <i data-lucide="tag" class="w-3 h-3"></i>
        <span x-text="filters.tags.length > 0 ? selectedTagNames() : 'Tags'"></span>
        <i data-lucide="chevron-down" class="w-3 h-3"></i>
      </button>
      <div class="absolute left-0 top-full mt-1 z-50 bg-base-100 border border-base-300 rounded-lg shadow-lg min-w-48 max-h-64 overflow-y-auto py-1"
           x-show="showTagDropdown" x-cloak
           x-transition>
        <template x-for="tag in allTags" :key="tag.uuid">
          <label class="flex items-center gap-2 px-3 py-1.5 hover:bg-base-200 cursor-pointer text-sm">
            <input type="checkbox"
                   class="checkbox checkbox-xs"
                   :checked="filters.tags.indexOf(tag.uuid) !== -1"
                   @change="toggleTagFilter(tag.uuid)">
            <span class="badge badge-xs" :class="'badge-' + tag.color" x-text="tag.name"></span>
          </label>
        </template>
      </div>
    </div>
    <div class="flex-1"></div>
    <span class="text-xs text-base-content/50" x-show="_hasActiveFilters()" x-text="notes.length + ' result' + (notes.length !== 1 ? 's' : '')"></span>
    <button class="btn btn-ghost btn-xs text-xs" x-show="_hasActiveFilters()" @click="clearFilters()">
      Clear
    </button>
  </div>
</div>

<!-- Notes -->
<div class="flex-1 overflow-y-auto">
  <template x-for="note in notes" :key="note.uuid">
    <button
      class="w-full text-left p-3 border-b border-base-300/50 hover:bg-base-200 transition-colors"
      :class="selectedNote?.uuid === note.uuid ? 'bg-success/5 border-l-2 border-l-success' : ''"
      @click="selectNote(note)"
    >
      <div class="flex items-center gap-1">
        <div class="font-medium text-sm truncate flex-1" x-html="highlightSearch(noteName(note))"></div>
        <i data-lucide="star" class="w-3 h-3 text-warning fill-warning flex-shrink-0" x-show="note.is_favorite" x-cloak></i>
      </div>
      <div class="text-xs text-base-content/50 mt-0.5" x-text="formatDate(note.updated_at)"></div>
      <div class="flex gap-1 mt-1" x-show="note.tags && note.tags.length">
        <template x-for="t in note.tags" :key="t.uuid">
          <span class="badge badge-xs" :class="'badge-' + t.color" x-text="t.name"></span>
        </template>
      </div>
    </button>
  </template>
  <div x-show="notes.length === 0 && !loadingNotes" class="p-4 text-center text-sm text-base-content/40">
    No notes found
  </div>
  <!-- Skeleton loading -->
  <template x-if="loadingNotes">
    <div>
      <template x-for="i in 6" :key="i">
        <div class="p-3 border-b border-base-300/50 animate-pulse">
          <div class="h-4 bg-base-300 rounded w-3/4 mb-2"></div>
          <div class="h-3 bg-base-300/60 rounded w-1/3"></div>
        </div>
      </template>
    </div>
  </template>
</div>
