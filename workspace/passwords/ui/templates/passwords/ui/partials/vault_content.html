<!-- vault_content.html — list and mosaic views + status bar -->
<div class="flex flex-col flex-1 min-h-0">

<!-- Scrollable content area -->
<div class="flex-1 overflow-auto min-h-0"
     @contextmenu.self.prevent="closeContextMenu()">

  <!-- Empty: folder empty (no items at all, no filter active) -->
  <div x-show="currentFolderItems.length === 0 && !search && typeFilter === 'all'"
       class="flex flex-col items-center justify-center h-full gap-4 text-base-content/40 py-16">
    <i data-lucide="folder-open" class="w-14 h-14 opacity-20"></i>
    <p class="text-lg font-medium"
       x-text="sidebarView === 'trash' ? 'Trash is empty' : sidebarView === 'favorites' ? 'No favorites yet' : 'This folder is empty'"></p>
    <p class="text-sm" x-show="sidebarView === 'all'">
      Use the <strong>+ New</strong> button to create a folder or entry.
    </p>
    <p class="text-sm" x-show="sidebarView === 'favorites'">
      Star an entry to add it to your favorites.
    </p>
  </div>

  <!-- Empty: no results for active filter/search -->
  <div x-show="currentFolderItems.length === 0 && (search || typeFilter !== 'all')"
       class="flex flex-col items-center justify-center h-full gap-2 text-base-content/40 py-16">
    <i data-lucide="search-x" class="w-12 h-12 opacity-20"></i>
    <p x-text="search ? 'No items match \'' + search + '\'' : 'No items match the current filter'"></p>
  </div>

  <!-- ── List view ─────────────────────────────────────────────────────── -->
  <table
    x-show="viewMode === 'list' && currentFolderItems.length > 0"
    x-cloak
    class="table table-fixed w-full [&_td]:align-middle [&_th]:align-middle"
  >
    <thead class="sticky top-0 z-10">
      <tr class="bg-base-200">
        <th class="w-10">
          <input type="checkbox" class="checkbox checkbox-sm align-middle"
                 @click="selectedUuids.size > 0 ? clearSelection() : currentFolderItems.forEach(i => toggleSelection(i.uuid))"
                 :checked="selectedUuids.size > 0 && selectedUuids.size === currentFolderItems.length"
                 :indeterminate="selectedUuids.size > 0 && selectedUuids.size < currentFolderItems.length" />
        </th>
        <th class="w-10"><span class="sr-only">Icon</span></th>
        <th>Name</th>
        <th class="w-10 text-center">Fav</th>
        <th class="hidden sm:table-cell w-24">Type</th>
        <th class="hidden md:table-cell w-36">Modified</th>
        <th class="w-12"><span class="sr-only">Actions</span></th>
      </tr>
    </thead>
    <tbody>
      <template x-for="item in currentFolderItems" :key="item.uuid">
        <tr
          class="hover group transition-opacity"
          :class="[
            isActionLoading(item.uuid) ? 'opacity-50 pointer-events-none' : '',
            isSelected(item.uuid) ? 'bg-warning/10' : ''
          ]"
          @mouseenter="hoveredUuid = item.uuid"
          @mouseleave="hoveredUuid = hoveredUuid === item.uuid ? null : hoveredUuid"
          @contextmenu.prevent="openContextMenu($event, item)"
          @click="item.nodeType === 'folder' ? navigateToFolder(item.uuid) : openPropertiesPanel(item)"
          style="cursor: pointer"
        >
          <!-- Checkbox -->
          <td @click.stop>
            <input type="checkbox" class="checkbox checkbox-sm align-middle"
                   :checked="isSelected(item.uuid)"
                   @click="toggleSelection(item.uuid)" />
          </td>

          <!-- Icon -->
          <td class="text-base-content/60">
            <template x-if="item.nodeType === 'folder'">
              <i :data-lucide="item.icon || 'folder'" class="w-5 h-5"
                 :class="item.color || 'text-warning'"></i>
            </template>
            <template x-if="item.nodeType === 'entry'">
              <i :data-lucide="item.icon || 'key-round'" class="w-5 h-5 text-base-content/50"></i>
            </template>
          </td>

          <!-- Name -->
          <td>
            <span class="font-medium block truncate" x-text="item.name"></span>
          </td>

          <!-- Favorite -->
          <td class="text-center text-base-content/60" @click.stop>
            <span x-show="isActionLoading(item.uuid)" class="loading loading-spinner loading-xs"></span>
            <button
              x-show="!isActionLoading(item.uuid) && item.nodeType === 'entry'"
              type="button"
              class="btn btn-ghost btn-xs btn-circle"
              :aria-label="item.is_favorite ? 'Remove from favorites' : 'Add to favorites'"
              @click="toggleFavorite(item.uuid, item.is_favorite)"
            >
              <i data-lucide="star" class="w-4 h-4"
                 :class="item.is_favorite ? 'text-warning fill-current' : 'opacity-30'"></i>
            </button>
          </td>

          <!-- Type -->
          <td class="hidden sm:table-cell text-sm text-base-content/60">
            <span x-text="item.nodeType === 'folder' ? 'Folder' : 'Login'"></span>
          </td>

          <!-- Modified -->
          <td class="hidden md:table-cell text-sm text-base-content/60">
            <span x-text="item.updated_at ? new Date(item.updated_at).toLocaleDateString() : '—'"></span>
          </td>

          <!-- Actions -->
          <td @click.stop>
            <span x-show="isActionLoading(item.uuid)" class="loading loading-spinner loading-xs"></span>
            <button
              x-show="!isActionLoading(item.uuid)"
              type="button"
              class="btn btn-ghost btn-xs btn-circle opacity-0 group-hover:opacity-100 focus:opacity-100 transition-opacity"
              @click="openContextMenu($event, item)"
            >
              <i data-lucide="more-vertical" class="w-4 h-4"></i>
            </button>
          </td>
        </tr>
      </template>
    </tbody>
  </table>

  <!-- ── Mosaic view ───────────────────────────────────────────────────── -->
  <div
    x-show="viewMode === 'mosaic' && currentFolderItems.length > 0"
    x-cloak
    :class="mosaicTileSize <= 2 ? 'p-2' : 'p-4'"
  >
    <div
      class="grid"
      :style="'grid-template-columns: repeat(auto-fill, minmax(' + tileMinWidth() + 'px, 1fr)); gap: ' + tileGap() + 'px'"
    >
      <template x-for="item in currentFolderItems" :key="item.uuid">
        <div
          class="bg-base-100 border border-base-300 rounded-lg hover:border-warning hover:shadow-lg transition-all cursor-pointer group relative overflow-hidden flex flex-col"
          :class="[
            isActionLoading(item.uuid) ? 'opacity-50 pointer-events-none' : '',
            isSelected(item.uuid) ? 'ring-2 ring-warning border-warning' : ''
          ]"
          @mouseenter="hoveredUuid = item.uuid"
          @mouseleave="hoveredUuid = hoveredUuid === item.uuid ? null : hoveredUuid"
          @contextmenu.prevent="openContextMenu($event, item)"
          @click="item.nodeType === 'folder' ? navigateToFolder(item.uuid) : openPropertiesPanel(item)"
        >
          <!-- Checkbox (top-left) -->
          <div class="absolute top-2 left-2 z-10" @click.stop>
            <input type="checkbox" class="checkbox checkbox-sm bg-base-100/80 backdrop-blur-sm"
                   :class="isSelected(item.uuid) ? 'opacity-100' : 'opacity-0 group-hover:opacity-100'"
                   :checked="isSelected(item.uuid)"
                   @click="toggleSelection(item.uuid)" />
          </div>

          <!-- Favorite (top-right, entries only) -->
          <div class="absolute top-2 right-2 z-10" @click.stop x-show="item.nodeType === 'entry'">
            <span x-show="isActionLoading(item.uuid)"
                  class="btn btn-ghost btn-xs btn-circle bg-base-100/80 backdrop-blur-sm pointer-events-none">
              <span class="loading loading-spinner loading-xs"></span>
            </span>
            <button x-show="!isActionLoading(item.uuid)" type="button"
                    class="btn btn-ghost btn-xs btn-circle bg-base-100/80 backdrop-blur-sm"
                    :class="item.is_favorite ? 'opacity-100' : 'opacity-0 group-hover:opacity-100'"
                    :aria-label="item.is_favorite ? 'Remove from favorites' : 'Add to favorites'"
                    @click="toggleFavorite(item.uuid, item.is_favorite)">
              <i data-lucide="star" class="w-4 h-4"
                 :class="item.is_favorite ? 'text-warning fill-current' : 'opacity-40'"></i>
            </button>
          </div>

          <!-- Icon area (square) -->
          <div class="relative w-full" style="padding-bottom: 100%;">
            <div class="absolute inset-0 flex items-center justify-center bg-base-200">
              <div :style="'width: ' + tileIconSize() + 'px; height: ' + tileIconSize() + 'px'">
                <template x-if="item.nodeType === 'folder'">
                  <i :data-lucide="item.icon || 'folder'" class="w-full h-full"
                     :class="item.color || 'text-warning'"></i>
                </template>
                <template x-if="item.nodeType === 'entry'">
                  <i :data-lucide="item.icon || 'key-round'" class="w-full h-full text-base-content/40"></i>
                </template>
              </div>
            </div>
          </div>

          <!-- Footer -->
          <div class="border-t border-base-300 flex-1" :class="mosaicTileSize <= 2 ? 'px-2 py-1.5' : 'p-3'">
            <div class="flex items-start justify-between gap-1">
              <div class="flex-1 min-w-0">
                <h3 class="font-medium truncate"
                    :class="mosaicTileSize <= 2 ? 'text-xs' : 'text-sm'"
                    x-text="item.name"></h3>
                <p class="text-xs text-base-content/60 mt-0.5"
                   :class="mosaicTileSize <= 1 ? 'hidden' : ''"
                   x-text="item.nodeType === 'folder' ? 'Folder' : 'Login'"></p>
              </div>
              <button
                type="button"
                class="btn btn-ghost btn-xs btn-circle flex-shrink-0 opacity-0 group-hover:opacity-100 focus:opacity-100"
                @click.stop="openContextMenu($event, item)"
              >
                <i data-lucide="more-vertical" class="w-4 h-4"></i>
              </button>
            </div>
          </div>
        </div>
      </template>
    </div>
  </div>
</div>

<!-- Status bar -->
<div class="flex-shrink-0 px-4 py-2 border-t border-base-300 bg-base-200/50 text-xs text-base-content/60">
  <div class="flex items-center gap-4">
    <span class="flex items-center gap-1">
      <i data-lucide="layers" class="w-3 h-3"></i>
      <span x-text="statusCounts.total + ' item' + (statusCounts.total !== 1 ? 's' : '')"></span>
    </span>
    <span x-show="statusCounts.folders > 0" class="flex items-center gap-1">
      <i data-lucide="folder" class="w-3 h-3"></i>
      <span x-text="statusCounts.folders + ' folder' + (statusCounts.folders !== 1 ? 's' : '')"></span>
    </span>
    <span x-show="statusCounts.entries > 0" class="flex items-center gap-1">
      <i data-lucide="key-round" class="w-3 h-3"></i>
      <span x-text="statusCounts.entries + ' entr' + (statusCounts.entries !== 1 ? 'ies' : 'y')"></span>
    </span>
  </div>
</div>
</div><!-- end flex-col wrapper -->
