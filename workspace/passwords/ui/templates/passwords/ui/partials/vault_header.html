<!-- vault_header.html — breadcrumb nav + New dropdown -->
<div class="bg-base-100 border-b border-base-300 px-4 py-3 lg:px-6 flex-shrink-0">
  <div class="flex items-start gap-3">
    <div class="flex-1 min-w-0">

      <!-- Nav buttons + breadcrumb row -->
      <div class="flex items-center justify-between gap-4 mb-1">
        <div class="flex items-center gap-2 min-w-0">

          <!-- Back / Forward / Up -->
          <div class="join">
            <button type="button"
              class="btn btn-ghost btn-sm btn-square join-item transition-colors disabled:bg-transparent disabled:border-transparent"
              :class="canGoBack ? 'text-base-content' : 'text-base-content/20'"
              :disabled="!canGoBack"
              title="Back"
              @click="goBack()">
              <i data-lucide="arrow-left" class="w-4 h-4"></i>
            </button>
            <button type="button"
              class="btn btn-ghost btn-sm btn-square join-item transition-colors disabled:bg-transparent disabled:border-transparent"
              :class="canGoForward ? 'text-base-content' : 'text-base-content/20'"
              :disabled="!canGoForward"
              title="Forward"
              @click="goForward()">
              <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </button>
            <button type="button"
              class="btn btn-ghost btn-sm btn-square join-item transition-colors disabled:bg-transparent disabled:border-transparent"
              :class="currentFolderUuid ? 'text-base-content' : 'text-base-content/20'"
              :disabled="!currentFolderUuid"
              title="Up"
              @click="goUp()">
              <i data-lucide="arrow-up" class="w-4 h-4"></i>
            </button>
          </div>

          <!-- Breadcrumb (Alpine-driven, not server-rendered) -->
          <nav class="flex items-center gap-1 text-sm min-w-0 overflow-hidden">
            <template x-for="(crumb, idx) in breadcrumbs" :key="crumb.uuid || '__root__'">
              <span class="flex items-center gap-1 min-w-0">
                <span x-show="idx > 0" class="text-base-content/30 flex-shrink-0">/</span>
                <button
                  type="button"
                  @click="navigateToFolder(crumb.uuid)"
                  :class="idx === breadcrumbs.length - 1
                    ? 'text-base-content font-medium truncate max-w-[120px]'
                    : 'text-base-content/50 hover:text-warning transition-colors truncate max-w-[80px]'"
                  x-text="crumb.name">
                </button>
              </span>
            </template>
          </nav>
        </div>

        <!-- New dropdown (hidden in trash view) -->
        <div x-show="sidebarView !== 'trash'" class="dropdown dropdown-end flex-shrink-0">
          <button tabindex="0" class="btn btn-warning btn-sm gap-2">
            <i data-lucide="plus" class="w-4 h-4"></i>
            <span class="hidden sm:inline">New</span>
            <i data-lucide="chevron-down" class="w-3 h-3 hidden sm:inline opacity-70"></i>
          </button>
          <ul tabindex="0" class="dropdown-content z-50 menu menu-sm shadow-xl bg-base-100 border border-base-300 rounded-lg w-44 mt-1 p-1">
            <li>
              <button type="button" class="gap-3"
                      @click="document.getElementById('create-entry-dialog').showModal()">
                <i data-lucide="key-round" class="w-4 h-4 text-warning"></i>
                New entry
              </button>
            </li>
            <li>
              <button type="button" class="gap-3"
                      @click="document.getElementById('create-folder-dialog').showModal()">
                <i data-lucide="folder-plus" class="w-4 h-4 text-warning"></i>
                New folder
              </button>
            </li>
          </ul>
        </div>
      </div>

      <!-- Title -->
      <h1 class="text-2xl font-bold text-base-content" x-text="sidebarView === 'trash' ? 'Trash' : currentFolderName"></h1>
    </div>
  </div>
</div>
