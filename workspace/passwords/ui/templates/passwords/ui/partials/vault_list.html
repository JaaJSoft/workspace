<div class="divide-y divide-base-300">
  <template x-for="vault in filteredVaults" :key="vault.uuid">
    <a :href="'/passwords/' + vault.uuid"
       class="flex items-center gap-4 px-4 py-3 hover:bg-base-200 transition-colors cursor-pointer group">
      <div class="w-9 h-9 rounded-lg flex items-center justify-center flex-shrink-0"
           :class="(vault.color && vault.color.startsWith('text-')) ? vault.color.replace('text-', 'bg-') + '/10' : 'bg-warning/10'">
        <i :data-lucide="vault.icon || 'vault'" class="w-5 h-5"
           :class="(vault.color && vault.color.startsWith('text-')) ? vault.color : 'text-warning'"></i>
      </div>
      <div class="flex-1 min-w-0">
        <div class="font-medium text-sm text-base-content truncate" x-text="vault.name"></div>
        <div class="text-xs text-base-content/40 truncate" x-text="vault.description || ''"></div>
      </div>
      <div class="flex items-center gap-3 flex-shrink-0">
        <span x-show="isUnlocked(vault.uuid)" class="badge badge-success badge-sm gap-1">
          <i data-lucide="lock-open" class="w-3 h-3"></i>
          <span class="hidden sm:inline">Unlocked</span>
        </span>
        <span x-show="!isUnlocked(vault.uuid)" class="badge badge-warning badge-sm badge-outline gap-1">
          <i data-lucide="lock" class="w-3 h-3"></i>
          <span class="hidden sm:inline">Locked</span>
        </span>
        <i data-lucide="chevron-right" class="w-4 h-4 text-base-content/30 group-hover:text-warning transition-colors"></i>
      </div>
    </a>
  </template>
</div>
