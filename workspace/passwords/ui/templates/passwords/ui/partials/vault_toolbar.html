<!-- vault_toolbar.html — search, filter, sort, reset, tile size, view toggle -->
<div class="border-b border-base-300 bg-base-100 px-3 py-2 flex-shrink-0">
  <div class="flex flex-wrap items-center gap-2">

    <!-- Search -->
    <label class="input input-sm input-bordered flex items-center gap-2 w-full sm:w-48 md:w-64">
      <i data-lucide="search" class="w-4 h-4 opacity-60"></i>
      <input
        type="search"
        class="grow"
        placeholder="Filter by name"
        x-model.debounce.200ms="search"
      />
    </label>

    <!-- Type filter -->
    <select class="select select-sm select-bordered" x-model="typeFilter">
      <option value="all">All</option>
      <option value="folders">Folders</option>
      <option value="entries">Entries</option>
      <option value="favorites">Favorites</option>
    </select>

    <!-- Sort field + direction + reset -->
    <div class="join">
      <select class="select select-sm select-bordered join-item" x-model="sortField">
        <option value="default">Default</option>
        <option value="name">Name</option>
        <option value="created">Created</option>
        <option value="modified">Modified</option>
        <option value="favorite">Favorite</option>
      </select>
      <button
        type="button"
        class="btn btn-sm btn-outline join-item"
        @click="toggleSortDir()"
        :disabled="sortField === 'default'"
        aria-label="Toggle sort direction"
      >
        <i data-lucide="arrow-up" class="w-4 h-4" x-show="sortDir === 'asc'" x-cloak></i>
        <i data-lucide="arrow-down" class="w-4 h-4" x-show="sortDir === 'desc'" x-cloak></i>
      </button>
    </div>

    <button type="button" class="btn btn-sm btn-ghost" @click="resetAll()" title="Reset filters and sorting">
      Reset
    </button>

    <!-- Spacer -->
    <div class="flex-1"></div>

    <!-- Tile size slider (mosaic only) -->
    <div class="flex items-center gap-1.5 text-warning" x-show="viewMode === 'mosaic'" x-cloak>
      <i data-lucide="grid-2x2" class="w-3 h-3 opacity-60"></i>
      <input
        type="range" min="1" max="5" step="1"
        x-model.number="mosaicTileSize"
        @change="setMosaicTileSize(mosaicTileSize)"
        class="range range-xs range-warning w-24"
        title="Tile size"
      />
      <i data-lucide="grid-2x2" class="w-5 h-5 opacity-60"></i>
    </div>

    <!-- View toggle -->
    <div class="join">
      <button
        type="button"
        class="btn btn-sm btn-outline join-item"
        :class="viewMode === 'list' ? 'bg-warning/10 text-warning' : ''"
        @click="setViewMode('list')"
        title="List view"
      >
        <i data-lucide="list" class="w-4 h-4"></i>
      </button>
      <button
        type="button"
        class="btn btn-sm btn-outline join-item"
        :class="viewMode === 'mosaic' ? 'bg-warning/10 text-warning' : ''"
        @click="setViewMode('mosaic')"
        title="Mosaic view"
      >
        <i data-lucide="grid-2x2" class="w-4 h-4"></i>
      </button>
    </div>

  </div>
</div>
