{% extends "base_with_navbar.html" %}

{% block title %}Projects{% endblock %}

{% block content %}
<div class="max-w-5xl mx-auto p-4 flex flex-col gap-4 w-full"
     x-data="{ creating: false, name: '', description: '', error: '' }">
  <div class="flex items-center justify-between">
    <h1 class="text-xl font-semibold">Projects</h1>
    <button class="btn btn-primary btn-sm" @click="$refs.newProjectDialog.showModal()">
      <i data-lucide="plus" class="w-4 h-4"></i>
      New project
    </button>
  </div>

  <div id="project-list-wrapper">
    {% include "projects/ui/partials/project_list.html" %}
  </div>

  <dialog x-ref="newProjectDialog" class="modal">
    <div class="modal-box max-w-sm">
      <h2 class="font-semibold mb-3">New project</h2>
      <template x-if="error">
        <div class="mb-2">
          <div class="alert alert-error text-sm" x-text="error"></div>
        </div>
      </template>
      <form @submit.prevent="
        creating = true; error = '';
        fetch('/api/v1/projects', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRFToken() },
          body: JSON.stringify({ name: name, description: description }),
        }).then(async (resp) => {
          if (!resp.ok) throw new Error('Could not create the project.');
          const data = await resp.json();
          window.location.href = '/projects/' + data.uuid;
        }).catch((e) => { error = e.message; }).finally(() => { creating = false; });
      ">
        <label class="form-control w-full">
          <div class="label"><span class="label-text">Name</span></div>
          <input type="text" class="input input-bordered w-full" x-model="name" required maxlength="255">
        </label>
        <label class="form-control w-full mt-2">
          <div class="label"><span class="label-text">Description</span></div>
          <textarea class="textarea textarea-bordered w-full" x-model="description" rows="2"></textarea>
        </label>
        <div class="modal-action">
          <button type="button" class="btn btn-ghost btn-sm" @click="$refs.newProjectDialog.close()">Cancel</button>
          <button type="submit" class="btn btn-primary btn-sm" :disabled="creating || !name.trim()">Create</button>
        </div>
      </form>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
  </dialog>
</div>
{% endblock %}
