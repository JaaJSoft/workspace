<dialog x-ref="taskDialog" class="modal">
  <div class="modal-box max-w-lg">
    <h2 class="font-semibold mb-3" x-text="form.uuid ? 'Edit task' : 'New task'"></h2>
    <template x-if="formError">
      <div class="mb-2">
        <div class="alert alert-error text-sm" x-text="formError"></div>
      </div>
    </template>
    <form @submit.prevent="saveTask()">
      <label class="form-control w-full">
        <div class="label"><span class="label-text">Title</span></div>
        <input type="text" class="input input-bordered w-full" x-model="form.title"
               required maxlength="255" :disabled="form.uuid && !can('edit')">
      </label>
      <label class="form-control w-full mt-2">
        <div class="label"><span class="label-text">Description</span></div>
        <textarea class="textarea textarea-bordered w-full" rows="4" x-model="form.description"
                  :disabled="form.uuid && !can('edit')" placeholder="Markdown supported"></textarea>
      </label>
      <div class="grid grid-cols-2 gap-2 mt-2">
        <label class="form-control">
          <div class="label"><span class="label-text">Status</span></div>
          <select class="select select-bordered select-sm" x-model="form.status"
                  :disabled="form.uuid && !can('move')">
            <template x-for="s in statuses" :key="s.uuid">
              <option :value="s.uuid" x-text="s.name" :selected="s.uuid === form.status"></option>
            </template>
          </select>
        </label>
        <label class="form-control">
          <div class="label"><span class="label-text">Priority</span></div>
          <select class="select select-bordered select-sm" x-model="form.priority"
                  :disabled="form.uuid && !can('edit')">
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
            <option value="urgent">Urgent</option>
          </select>
        </label>
        <label class="form-control">
          <div class="label"><span class="label-text">Due date</span></div>
          <input type="date" class="input input-bordered input-sm" x-model="form.due_date"
                 :disabled="form.uuid && !can('set_due')">
        </label>
      </div>
      <div class="mt-2" x-show="members.length">
        <div class="label"><span class="label-text">Assignees</span></div>
        <div class="flex flex-wrap gap-3 mt-1">
          <template x-for="m in members" :key="m.uuid">
            <label class="label cursor-pointer gap-1 p-0">
              <input type="checkbox" class="checkbox checkbox-xs" :value="m.uuid"
                     x-model="form.assignees" :disabled="form.uuid && !can('assign')">
              <span class="label-text text-xs" x-text="m.username"></span>
            </label>
          </template>
        </div>
      </div>
      <div class="mt-2" x-show="labels.length">
        <div class="label"><span class="label-text">Labels</span></div>
        <div class="flex flex-wrap gap-3 mt-1">
          <template x-for="l in labels" :key="l.uuid">
            <label class="label cursor-pointer gap-1 p-0">
              <input type="checkbox" class="checkbox checkbox-xs" :value="l.uuid"
                     x-model="form.labels" :disabled="form.uuid && !can('set_labels')">
              <span class="label-text text-xs" x-text="l.name"></span>
            </label>
          </template>
        </div>
      </div>
      <div class="modal-action">
        <button type="button" class="btn btn-error btn-outline btn-sm mr-auto" x-show="form.uuid"
                :disabled="!can('delete')" @click="deleteTask()">Delete</button>
        <button type="button" class="btn btn-ghost btn-sm" @click="$refs.taskDialog.close()">Cancel</button>
        <button type="submit" class="btn btn-primary btn-sm"
                :disabled="saving || !form.title.trim() || (form.uuid && !can('edit'))">Save</button>
      </div>
    </form>
  </div>
  <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>
