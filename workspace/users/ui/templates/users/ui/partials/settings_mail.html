<!-- Mail Tab -->
<div x-show="tab === 'mail'" x-cloak class="space-y-4">
  <!-- AI Features -->
  <div class="card bg-base-100 border border-base-300 shadow-sm">
    <div class="card-body">
      <h2 class="card-title text-lg gap-2">
        <i data-lucide="sparkles" class="w-5 h-5"></i>
        AI Features
      </h2>
      <p class="text-sm text-base-content/60 mt-1">
        Pick which AI features run on your mailbox. Each one can be turned on or off independently.
      </p>

      <div class="form-control mt-4">
        <label class="label cursor-pointer justify-start gap-3">
          <input type="checkbox"
                 class="toggle toggle-warning toggle-sm"
                 :checked="getSetting('mail', 'ai_classify', getSetting('mail', 'ai_enabled', true))"
                 @change="setSetting('mail', 'ai_classify', $event.target.checked)"
          />
          <div>
            <span class="label-text font-medium">Auto-classify new emails</span>
            <p class="text-xs text-base-content/50 mt-0.5">
              Automatically sort new emails into labels as they arrive.
            </p>
          </div>
        </label>
      </div>

      <div class="form-control mt-3">
        <label class="label cursor-pointer justify-start gap-3">
          <input type="checkbox"
                 class="toggle toggle-warning toggle-sm"
                 :checked="getSetting('mail', 'ai_extract', getSetting('mail', 'ai_enabled', true))"
                 @change="setSetting('mail', 'ai_extract', $event.target.checked)"
          />
          <div>
            <span class="label-text font-medium">Extract events and tasks</span>
            <p class="text-xs text-base-content/50 mt-0.5">
              Detect dates, meetings, and to-dos in new emails and surface them as suggestions.
            </p>
          </div>
        </label>
      </div>

      <div class="form-control mt-3">
        <label class="label cursor-pointer justify-start gap-3">
          <input type="checkbox"
                 class="toggle toggle-warning toggle-sm"
                 :checked="getSetting('mail', 'ai_manual', getSetting('mail', 'ai_enabled', true))"
                 @change="setSetting('mail', 'ai_manual', $event.target.checked)"
          />
          <div>
            <span class="label-text font-medium">AI writing assistance</span>
            <p class="text-xs text-base-content/50 mt-0.5">
              Summaries, AI-drafted replies, and AI-assisted composition from the mail UI.
            </p>
          </div>
        </label>
      </div>
    </div>
  </div>
</div>
