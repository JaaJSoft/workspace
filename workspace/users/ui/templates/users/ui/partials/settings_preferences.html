<!-- Preferences Tab -->
<div x-show="tab === 'preferences'" x-cloak x-data="themePickerForm()">
  <div class="card bg-base-100 border border-base-300 shadow-sm">
    <div class="card-body">
      <h2 class="card-title text-lg gap-2">
        <i data-lucide="palette" class="w-5 h-5"></i>
        Appearance
      </h2>

      <p class="text-sm text-base-content/60 mt-1">Choose a theme for your workspace.</p>

      <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3 mt-4">
        <template x-for="t in themes" :key="t.id">
          <button
            type="button"
            @click="applyTheme(t.id)"
            class="rounded-lg border-2 p-3 text-left transition-all hover:scale-[1.02]"
            :class="current === t.id ? 'border-primary ring-2 ring-primary/30' : 'border-base-300 hover:border-base-content/20'"
          >
            <!-- Mini theme preview -->
            <div class="flex gap-1 mb-2" :data-theme="t.id">
              <div class="rounded-full w-4 h-4 bg-primary"></div>
              <div class="rounded-full w-4 h-4 bg-secondary"></div>
              <div class="rounded-full w-4 h-4 bg-accent"></div>
              <div class="rounded-full w-4 h-4 bg-neutral"></div>
            </div>
            <span class="text-sm font-medium capitalize" x-text="t.label"></span>
          </button>
        </template>
      </div>
    </div>
  </div>
</div>

<script>
  function themePickerForm() {
    return {
      current: localStorage.getItem('theme') || 'light',
      themes: [
        { id: 'light',     label: 'Light' },
        { id: 'dark',      label: 'Dark' },
        { id: 'cupcake',   label: 'Cupcake' },
        { id: 'emerald',   label: 'Emerald' },
        { id: 'corporate', label: 'Corporate' },
        { id: 'forest',    label: 'Forest' },
        { id: 'dracula',   label: 'Dracula' },
        { id: 'night',     label: 'Night' },
        { id: 'winter',    label: 'Winter' },
        { id: 'nord',      label: 'Nord' },
        { id: 'sunset',    label: 'Sunset' },
        { id: 'autumn',    label: 'Autumn' },
      ],
      applyTheme(id) {
        this.current = id;
        document.documentElement.setAttribute('data-theme', id);
        localStorage.setItem('theme', id);
        const toggle = document.getElementById('themeToggle');
        if (toggle) toggle.checked = (id === 'dark');
        const csrfToken = getCSRFToken();
        fetch('/api/v1/settings/core/theme', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
          body: JSON.stringify({ value: id }),
        });
      },
    };
  }
</script>
